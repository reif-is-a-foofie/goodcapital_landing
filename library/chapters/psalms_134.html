<div class="scripture">
<h2 class="book-title">Psalms</h2>
<p class="chapter-num">134</p>
<div class="verse" id="v1">
<span class="verse-num">1</span>
<span class="verse-text">A Song of degrees. Behold, bless ye the LORD, all [ye] servants of the LORD, which by night stand in the house of the LORD.</span>
</div>
<div class="verse" id="v2">
<span class="verse-num">2</span>
<span class="verse-text">Lift up your hands [in] the sanctuary, and bless the LORD.</span>
</div>
<div class="verse" id="v3">
<span class="verse-num">3</span>
<span class="verse-text">The LORD that made heaven and earth bless thee out of Zion.</span>
</div>
</div>
