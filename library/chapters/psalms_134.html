<div class="scripture">
<h2 class="book-title">Psalms</h2>
<p class="chapter-num">134</p>
<div class="verse" id="v1">
<span class="verse-num">1</span>
<span class="verse-text">A <span class="w" data-st="song" data-v="1" style="--ws:0.503">Song</span> of <span class="w" data-st="degree" data-v="1" style="--ws:0.503">degrees</span>. <span class="w" data-st="behold" data-v="1" style="--ws:0.119">Behold</span>, <span class="w" data-st="bless" data-v="1" style="--ws:0.411">bless</span> ye the <span class="w" data-st="lord" data-v="1" style="--ws:1.0">LORD</span>, all [ye] <span class="w" data-st="servant" data-v="1" style="--ws:0.749">servants</span> of the LORD, which by <span class="w" data-st="night" data-v="1" style="--ws:0.411">night</span> <span class="w" data-st="stand" data-v="1" style="--ws:0.438">stand</span> in the <span class="w" data-st="house" data-v="1" style="--ws:0.541">house</span> of the LORD.</span>
</div>
<div class="verse" id="v2">
<span class="verse-num">2</span>
<span class="verse-text"><span class="w" data-st="lift" data-v="2" style="--ws:0.231">Lift</span> up your <span class="w" data-st="hand" data-v="2" style="--ws:0.099">hands</span> [in] the <span class="w" data-st="sanctu" data-v="2" style="--ws:0.132">sanctuary</span>, and <span class="w" data-st="bless" data-v="2" style="--ws:1.0">bless</span> the <span class="w" data-st="lord" data-v="2" style="--ws:1.0">LORD</span>.</span>
</div>
<div class="verse" id="v3">
<span class="verse-num">3</span>
<span class="verse-text">The <span class="w" data-st="lord" data-v="3" style="--ws:1.0">LORD</span> that made <span class="w" data-st="heaven" data-v="3" style="--ws:0.84">heaven</span> and <span class="w" data-st="earth" data-v="3" style="--ws:0.965">earth</span> <span class="w" data-st="bless" data-v="3" style="--ws:0.716">bless</span> thee <span class="w" data-st="out" data-v="3" style="--ws:0.468">out</span> of <span class="w" data-st="zion" data-v="3" style="--ws:0.468">Zion</span>.</span>
</div>
