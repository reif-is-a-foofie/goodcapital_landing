<h2 class="book-title">Psalms</h2>
<p class="chapter-num">117</p>
<div class="verse" id="v1">
<span class="verse-num">1</span>
<span class="verse-text">O <span class="w" data-st="praise" data-v="1" style="--ws:1.0">praise</span> the <span class="w" data-st="lord" data-v="1" style="--ws:1.0">LORD</span>, all ye <span class="w" data-st="nation" data-v="1" style="--ws:0.249">nations</span>: praise him, all ye people.</span>
</div>
<div class="verse" id="v2">
<span class="verse-num">2</span>
<span class="verse-text">For his <span class="w" data-st="merci" data-v="2" style="--ws:0.328">merciful</span> kindness is <span class="w" data-st="great" data-v="2" style="--ws:0.328">great</span> <span class="w" data-st="toward" data-v="2" style="--ws:0.328">toward</span> us: and the <span class="w" data-st="truth" data-v="2" style="--ws:0.328">truth</span> of the <span class="w" data-st="lord" data-v="2" style="--ws:1.0">LORD</span> [<span class="w" data-st="endureth" data-v="2" style="--ws:0.397">endureth</span>] for <span class="w" data-st="ever" data-v="2" style="--ws:0.397">ever</span>. <span class="w" data-st="praise" data-v="2" style="--ws:0.931">Praise</span> ye the LORD.</span>
</div>
