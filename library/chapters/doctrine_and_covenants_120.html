<div class="scripture">
<h2 class="book-title">Doctrine and Covenants</h2>
<p class="chapter-num">120</p>
<div class="verse" id="v1"><span class="verse-num">1</span><span class="verse-text"><span class="w" data-st="veri" data-v="1" style="--ws:0.896">Verily</span>, thus saith the <span class="w" data-st="lord" data-v="1" style="--ws:0.371">Lord</span>, the time is now come, that it shall be <span class="w" data-st="dispos" data-v="1" style="--ws:0.512">disposed</span> of by a <span class="w" data-st="council" data-v="1" style="--ws:1.0">council</span>, <span class="w" data-st="compos" data-v="1" style="--ws:0.874">composed</span> of the First <span class="w" data-st="presidency" data-v="1" style="--ws:0.916">Presidency</span> of my <span class="w" data-st="church" data-v="1" style="--ws:0.912">Church</span>, and of the <span class="w" data-st="bishop" data-v="1" style="--ws:0.899">bishop</span> and his <span class="w" data-st="council" data-v="1" style="--ws:1.0">council</span>, and by my <span class="w" data-st="high" data-v="1" style="--ws:0.912">high</span> <span class="w" data-st="council" data-v="1" style="--ws:1.0">council</span>; and by mine own voice unto them, saith the <span class="w" data-st="lord" data-v="1" style="--ws:0.371">Lord</span>. Even so. Amen.</span></div>
