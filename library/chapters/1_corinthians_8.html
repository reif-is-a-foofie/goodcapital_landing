<div class="scripture">
<div class="verse" id="v1"><span class="verse-num">1</span><span class="verse-text">NOW as <span class="w" data-st="touch" data-v="1" style="--ws:0.802">touching</span> things <span class="w" data-st="offer" data-v="1" style="--ws:0.366">offered</span></span></div>
<div class="verse" id="v2"><span class="verse-num">2</span><span class="verse-text">And if any man <span class="w" data-st="think" data-v="2" style="--ws:0.75">think</span></span></div>
<div class="verse" id="v3"><span class="verse-num">3</span><span class="verse-text">But if any <span class="w" data-st="man" data-v="3" style="--ws:0.2">man</span> <span class="w" data-st="love" data-v="3" style="--ws:0.994">love</span></span></div>
<div class="verse" id="v4"><span class="verse-num">4</span><span class="verse-text">As <span class="w" data-st="concern" data-v="4" style="--ws:0.993">concerning</span></span></div>
<div class="verse" id="v5"><span class="verse-num">5</span><span class="verse-text">For <span class="w" data-st="though" data-v="5" style="--ws:0.955">though</span></span></div>
<div class="verse" id="v6"><span class="verse-num">6</span><span class="verse-text">But to us [there is but] one <span class="w" data-st="god" data-v="6" style="--ws:1.0">God</span></span></div>
<div class="verse" id="v7"><span class="verse-num">7</span><span class="verse-text"><span class="w" data-st="howbeit" data-v="7" style="--ws:0.894">Howbeit</span></span></div>
<div class="verse" id="v8"><span class="verse-num">8</span><span class="verse-text">But <span class="w" data-st="meat" data-v="8" style="--ws:0.806">meat</span></span></div>
<div class="verse" id="v9"><span class="verse-num">9</span><span class="verse-text">But take <span class="w" data-st="heed" data-v="9" style="--ws:1.0">heed</span></span></div>
<div class="verse" id="v10"><span class="verse-num">10</span><span class="verse-text">For if any man see</span></div>
<div class="verse" id="v11"><span class="verse-num">11</span><span class="verse-text">And through thy <span class="w" data-st="knowledge" data-v="11" style="--ws:0.827">knowledge</span></span></div>
<div class="verse" id="v12"><span class="verse-num">12</span><span class="verse-text">But when ye <span class="w" data-st="sin" data-v="12" style="--ws:0.997">sin</span></span></div>
<div class="verse" id="v13"><span class="verse-num">13</span><span class="verse-text">Wherefore, if <span class="w" data-st="meat" data-v="13" style="--ws:0.74">meat</span></span></div>
</div>
