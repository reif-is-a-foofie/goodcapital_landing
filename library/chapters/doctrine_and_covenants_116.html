<h2 class="book-title">Doctrine and Covenants</h2>
<p class="chapter-num">116</p>
<div class="verse" id="v1"><span class="verse-num">1</span><span class="verse-text"><span class="w" data-st="spr" data-v="1" style="--ws:0.955">Spring</span> <span class="w" data-st="hill" data-v="1" style="--ws:0.94">Hill</span> is <span class="w" data-st="nam" data-v="1" style="--ws:0.874">named</span> by the <span class="w" data-st="lord" data-v="1" style="--ws:0.495">Lord</span> <span class="w" data-st="adam" data-v="1" style="--ws:1.0">Adam</span>-<span class="w" data-st="ondi" data-v="1" style="--ws:0.837">ondi</span>-<span class="w" data-st="ahman" data-v="1" style="--ws:0.985">Ahman</span>, <span class="w" data-st="because" data-v="1" style="--ws:0.495">because</span>, said he, it is the place where <span class="w" data-st="adam" data-v="1" style="--ws:1.0">Adam</span> shall come to <span class="w" data-st="visit" data-v="1" style="--ws:0.97">visit</span> his people, or the <span class="w" data-st="ancient" data-v="1" style="--ws:0.955">Ancient</span> of Days shall <span class="w" data-st="sit" data-v="1" style="--ws:0.985">sit</span>, as <span class="w" data-st="spoken" data-v="1" style="--ws:0.998">spoken</span> of by <span class="w" data-st="daniel" data-v="1" style="--ws:0.985">Daniel</span> the <span class="w" data-st="prophet" data-v="1" style="--ws:0.495">prophet</span>.</span></div>
