<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>John 1 — Design Test</title>
<style>
:root {
    --bg: #FAF8F4;
    --panel-bg: #FEFCF8;
    --text: #2C2418;
    --muted: #7a6e60;
    --accent: #9C7A4D;
    --divider: rgba(0,0,0,0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
    font-family: -apple-system, 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: grid;
    grid-template-columns: 1fr 1fr;
    height: 100vh;
    overflow: hidden;
}

/* ── Left: Reader ── */
#reader {
    overflow-y: auto;
    padding: 40px 40px 80px 48px;
    border-right: 1px solid var(--divider);
}

h1 {
    font-family: 'EB Garamond', Georgia, serif;
    font-size: 28px;
    font-weight: 400;
    color: var(--accent);
    margin-bottom: 4px;
}
.chapter-label {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 36px;
    letter-spacing: .05em;
    text-transform: uppercase;
}

/* ── Verses ── */
.verse {
    display: grid;
    grid-template-columns: 28px 1fr;
    gap: 12px;
    margin-bottom: 14px;
    align-items: baseline;
    cursor: pointer;
    border-radius: 6px;
    padding: 4px 6px 4px 0;
    margin-left: -6px;
    transition: background .1s;
}
.verse:hover { background: rgba(156,122,77,0.06); }
.verse.active {
    background: rgba(156,122,77,0.1);
}

.verse-num {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    text-align: right;
    padding-top: 3px;
    user-select: none;
}
.verse.has-insight .verse-num { color: var(--accent); }
.verse.active .verse-num { color: var(--accent); }

.verse-text {
    font-family: 'EB Garamond', Georgia, serif;
    font-size: 19px;
    line-height: 1.75;
    color: var(--text);
}
.verse.active .verse-text { color: var(--text); }

/* ── Right: Panel ── */
#panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--panel-bg);
}

#panel-body {
    flex: 1;
    overflow-y: auto;
    overscroll-behavior: contain;
}

/* Empty state */
.panel-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    padding: 40px;
    text-align: center;
    color: var(--muted);
}
.panel-empty-icon {
    font-size: 32px;
    margin-bottom: 16px;
    opacity: 0.4;
}
.panel-empty-text {
    font-size: 14px;
    line-height: 1.6;
    max-width: 260px;
}

/* Panel header — verse being read */
.panel-header {
    padding: 24px 28px 20px;
    border-bottom: 1px solid var(--divider);
    flex-shrink: 0;
}
.panel-verse-ref {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
}
.panel-verse-text {
    font-family: 'EB Garamond', Georgia, serif;
    font-size: 15px;
    line-height: 1.65;
    color: var(--text);
    font-style: italic;
}

/* No connections state */
.panel-no-connections {
    padding: 32px 28px;
    color: var(--muted);
    font-size: 13px;
    line-height: 1.6;
}

/* ── Insight cards ── */
.insight-card {
    padding: 22px 28px;
    border-bottom: 1px solid var(--divider);
}

.card-tradition {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--accent);
    background: rgba(156,122,77,0.1);
    border-radius: 4px;
    padding: 2px 7px;
    margin-bottom: 10px;
}

.card-author {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 2px;
}
.card-date {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 14px;
}

.card-quote {
    font-family: 'EB Garamond', Georgia, serif;
    font-size: 15.5px;
    line-height: 1.75;
    color: var(--text);
    font-style: italic;
    margin-bottom: 14px;
    padding-left: 14px;
    border-left: 2px solid rgba(156,122,77,0.35);
}

.card-source-link {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: .02em;
    cursor: pointer;
    background: none;
    border: none;
    padding: 0;
    text-decoration: none;
}
.card-source-link:hover { text-decoration: underline; }

/* ── Mobile ── */
@media (max-width: 700px) {
    body {
        grid-template-columns: 1fr;
        grid-template-rows: 1fr auto;
    }
    #reader { padding: 24px 20px 40px; border-right: none; border-bottom: 1px solid var(--divider); }
    #panel { max-height: 50vh; border-top: 1px solid var(--divider); }
}
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
</head>
<body>

<div id="reader">
    <h1>John</h1>
    <p class="chapter-label">Chapter 1 · Design Prototype</p>
    <div id="verses"></div>
</div>

<div id="panel">
    <div id="panel-body">
        <div class="panel-empty">
            <div class="panel-empty-icon">✦</div>
            <div class="panel-empty-text">Tap any verse to see voices from across Christian history standing beside it.</div>
        </div>
    </div>
</div>

<script>
// ── Insight data: real quotes, no AI summaries ────────────────────────────────
// Format: tradition badge, author name, work + date, then their own words.

var INSIGHTS = {
    1: {
        verseText: "In the beginning was the Word, and the Word was with God, and the Word was God.",
        cards: [
            {
                tradition: "LDS · 1915",
                author: "James E. Talmage",
                date: "Jesus the Christ, Ch. 1",
                quote: "In the beginning was the Word, and the Word was with God, and the Word was God. The same was in the beginning with God. All things were made by him; and without him was not any thing made that was made. In him was life; and the life was the light of men.",
                sourceLabel: "Read in Jesus the Christ →"
            },
            {
                tradition: "Church Fathers · c. 165 AD",
                author: "Justin Martyr",
                date: "First Apology, Ch. 46",
                quote: "We have been taught that Christ is the first-begotten of God, and we have declared above that He is the Word of whom every race of men were partakers; and those who lived reasonably are Christians, even though they have been thought atheists.",
                sourceLabel: "Read in First Apology →"
            }
        ]
    },
    3: {
        verseText: "All things were made by him; and without him was not any thing made that was made.",
        cards: [
            {
                tradition: "Church Fathers · c. 200 AD",
                author: "Irenaeus of Lyon",
                date: "Against Heresies, Book I",
                quote: "The Word of God, our Lord Jesus Christ, who did, through His transcendent love, become what we are, that He might bring us to be even what He is Himself. For it was for this end that the Word of God was made man, and He who was the Son of God became the Son of man.",
                sourceLabel: "Read in Against Heresies →"
            }
        ]
    },
    9: {
        verseText: "That was the true Light, which lighteth every man that cometh into the world.",
        cards: [
            {
                tradition: "Church Fathers · c. 254 AD",
                author: "Origen of Alexandria",
                date: "Commentary on John",
                quote: "Now the light of men is the Word, or Reason, of God. By the Word and Reason are we distinguished from the brutes. The true light, which lighteth every man, was in the world — not after the incarnation only, but from the beginning.",
                sourceLabel: "Read in Commentary on John →"
            }
        ]
    },
    13: {
        verseText: "Which were born, not of blood, nor of the will of the flesh, nor of the will of man, but of God.",
        cards: [
            {
                tradition: "Church Fathers · c. 412 AD",
                author: "Augustine of Hippo",
                date: "Anti-Pelagian Writings",
                quote: "That men are not born in the body of this death, that so they may be able to affirm that they have no need of God's grace through Jesus Christ in order to be delivered from the body of this death. Whoever is born of God sinneth not — this regeneration is not of blood, nor of the will of the flesh, nor of the will of man, but of God.",
                sourceLabel: "Read in Anti-Pelagian Writings →"
            }
        ]
    },
    14: {
        verseText: "And the Word was made flesh, and dwelt among us, (and we beheld his glory, the glory as of the only begotten of the Father,) full of grace and truth.",
        cards: [
            {
                tradition: "LDS · 1915",
                author: "James E. Talmage",
                date: "Jesus the Christ, Ch. 1",
                quote: "The antemortal existence of Jesus Christ is affirmed by many scriptural witnesses... The Eternal Word, who was with God and who was God, became incarnate, took upon Himself mortal flesh — not as a symbol but as a literal fact of existence.",
                sourceLabel: "Read in Jesus the Christ →"
            },
            {
                tradition: "Church Fathers · c. 200 AD",
                author: "Tertullian",
                date: "Against Praxeas, Ch. 27",
                quote: "We see plainly the twofold state, which is not confounded, but conjoined in One Person — Jesus, God and Man. There is the Spirit of God, and there is the Son of God; and the third from the Spirit and the Flesh is Jesus. And thus that which took our nature is God, the Word made flesh.",
                sourceLabel: "Read in Against Praxeas →"
            }
        ]
    },
    29: {
        verseText: "The next day John seeth Jesus coming unto him, and saith, Behold the Lamb of God, which taketh away the sin of the world.",
        cards: [
            {
                tradition: "LDS · 1915",
                author: "James E. Talmage",
                date: "Jesus the Christ, Ch. 11",
                quote: "John the Baptist recognized Jesus as the Lamb of God — He who was the antitype of all the sacrificial offerings that had been made since Adam's day. The blood of bulls and of goats, and the ashes of an heifer, had been efficacious only in prefiguring the great and last sacrifice.",
                sourceLabel: "Read in Jesus the Christ →"
            },
            {
                tradition: "Jewish / Ancient Texts · c. 50 AD",
                author: "Philo of Alexandria",
                date: "On the Special Laws, I",
                quote: "The sacrificial lamb must be without blemish, that the offering may be worthy of the altar of God. For whatever is given to God should be perfect and complete and incorruptible in every part — the symbol of an uncorrupted and blameless soul.",
                sourceLabel: "Read in On the Special Laws →"
            }
        ]
    },
    42: {
        verseText: "And he brought him to Jesus. And when Jesus beheld him, he said, Thou art Simon the son of Jona: thou shalt be called Cephas, which is by interpretation, A stone.",
        cards: [
            {
                tradition: "Church Fathers · c. 254 AD",
                author: "Origen of Alexandria",
                date: "Commentary on Matthew",
                quote: "If we too have said like Peter, Thou art the Christ, the Son of the living God — not as if flesh and blood had revealed it unto us, but by the light from the Father in the heavens having shone in our heart — we become a Peter, and to us there might be said by the Word, Thou art Peter.",
                sourceLabel: "Read in Commentary on Matthew →"
            }
        ]
    }
};

// ── KJV text ──────────────────────────────────────────────────────────────────
var VERSES = [
    [1,  "In the beginning was the Word, and the Word was with God, and the Word was God."],
    [2,  "The same was in the beginning with God."],
    [3,  "All things were made by him; and without him was not any thing made that was made."],
    [4,  "In him was life; and the life was the light of men."],
    [5,  "And the light shineth in darkness; and the darkness comprehended it not."],
    [6,  "There was a man sent from God, whose name was John."],
    [7,  "The same came for a witness, to bear witness of the Light, that all men through him might believe."],
    [8,  "He was not that Light, but was sent to bear witness of that Light."],
    [9,  "That was the true Light, which lighteth every man that cometh into the world."],
    [10, "He was in the world, and the world was made by him, and the world knew him not."],
    [11, "He came unto his own, and his own received him not."],
    [12, "But as many as received him, to them gave he power to become the sons of God, even to them that believe on his name:"],
    [13, "Which were born, not of blood, nor of the will of the flesh, nor of the will of man, but of God."],
    [14, "And the Word was made flesh, and dwelt among us, (and we beheld his glory, the glory as of the only begotten of the Father,) full of grace and truth."],
    [15, "John bare witness of him, and cried, saying, This was he of whom I spake, He that cometh after me is preferred before me: for he was before me."],
    [16, "And of his fulness have all we received, and grace for grace."],
    [17, "For the law was given by Moses, but grace and truth came by Jesus Christ."],
    [18, "No man hath seen God at any time; the only begotten Son, which is in the bosom of the Father, he hath declared him."],
    [19, "And this is the record of John, when the Jews sent priests and Levites from Jerusalem to ask him, Who art thou?"],
    [20, "And he confessed, and denied not; but confessed, I am not the Christ."],
    [21, "And they asked him, What then? Art thou Elias? And he saith, I am not. Art thou that prophet? And he answered, No."],
    [22, "Then said they unto him, Who art thou? that we may give an answer to them that sent us. What sayest thou of thyself?"],
    [23, "He said, I am the voice of one crying in the wilderness, Make straight the way of the Lord, as said the prophet Esaias."],
    [24, "And they which were sent were of the Pharisees."],
    [25, "And they asked him, and said unto him, Why baptizest thou then, if thou be not that Christ, nor Elias, neither that prophet?"],
    [26, "John answered them, saying, I baptize with water: but there standeth one among you, whom ye know not;"],
    [27, "He it is, who coming after me is preferred before me, whose shoe's latchet I am not worthy to unloose."],
    [28, "These things were done in Bethabara beyond Jordan, where John was baptizing."],
    [29, "The next day John seeth Jesus coming unto him, and saith, Behold the Lamb of God, which taketh away the sin of the world."],
    [30, "This is he of whom I said, After me cometh a man which is preferred before me: for he was before me."],
    [31, "And I knew him not: but that he should be made manifest to Israel, therefore am I come baptizing with water."],
    [32, "And John bare record, saying, I saw the Spirit descending from heaven like a dove, and it abode upon him."],
    [33, "And I knew him not: but he that sent me to baptize with water, the same said unto me, Upon whom thou shalt see the Spirit descending, and remaining on him, the same is he which baptizeth with the Holy Ghost."],
    [34, "And I saw, and bare record that this is the Son of God."],
    [35, "Again the next day after John stood, and two of his disciples;"],
    [36, "And looking upon Jesus as he walked, he saith, Behold the Lamb of God!"],
    [37, "And the two disciples heard him speak, and they followed Jesus."],
    [38, "Then Jesus turned, and saw them following, and saith unto them, What seek ye? They said unto him, Rabbi, (which is to say, being interpreted, Master,) where dwellest thou?"],
    [39, "He saith unto them, Come and see. They came and saw where he dwelt, and abode with him that day: for it was about the tenth hour."],
    [40, "One of the two which heard John speak, and followed him, was Andrew, Simon Peter's brother."],
    [41, "He first findeth his own brother Simon, and saith unto him, We have found the Messias, which is, being interpreted, the Christ."],
    [42, "And he brought him to Jesus. And when Jesus beheld him, he said, Thou art Simon the son of Jona: thou shalt be called Cephas, which is by interpretation, A stone."],
    [43, "The day following Jesus would go forth into Galilee, and findeth Philip, and saith unto him, Follow me."],
    [44, "Now Philip was of Bethsaida, the city of Andrew and Peter."],
    [45, "Philip findeth Nathanael, and saith unto him, We have found him, of whom Moses in the law, and the prophets, did write, Jesus of Nazareth, the son of Joseph."],
    [46, "And Nathanael said unto him, Can there any good thing come out of Nazareth? Philip saith unto him, Come and see."],
    [47, "Jesus saw Nathanael coming to him, and saith of him, Behold an Israelite indeed, in whom is no guile!"],
    [48, "Nathanael saith unto him, Whence knowest thou me? Jesus answered and said unto him, Before that Philip called thee, when thou wast under the fig tree, I saw thee."],
    [49, "Nathanael answered and saith unto him, Rabbi, thou art the Son of God; thou art the King of Israel."],
    [50, "Jesus answered and said unto him, Because I said unto thee, I saw thee under the fig tree, believest thou? thou shalt see greater things than these."],
    [51, "And he saith unto him, Verily, verily, I say unto you, Hereafter ye shall see heaven open, and the angels of God ascending and descending upon the Son of man."]
];

// ── Render verses ─────────────────────────────────────────────────────────────
var activeVerse = null;
var container = document.getElementById('verses');

VERSES.forEach(function(row) {
    var num = row[0], text = row[1];
    var insight = INSIGHTS[num];

    var div = document.createElement('div');
    div.className = 'verse' + (insight ? ' has-insight' : '');
    div.id = 'v' + num;

    var numSpan = document.createElement('span');
    numSpan.className = 'verse-num';
    numSpan.textContent = num;

    var textSpan = document.createElement('span');
    textSpan.className = 'verse-text';
    textSpan.textContent = text;

    div.appendChild(numSpan);
    div.appendChild(textSpan);

    div.addEventListener('click', function() {
        selectVerse(num, text, insight);
    });

    container.appendChild(div);
});

// ── Panel logic ───────────────────────────────────────────────────────────────
function selectVerse(num, text, insight) {
    // Highlight active verse
    if (activeVerse) activeVerse.classList.remove('active');
    activeVerse = document.getElementById('v' + num);
    if (activeVerse) activeVerse.classList.add('active');

    var body = document.getElementById('panel-body');
    var html = '';

    // Verse header
    html += '<div class="panel-header">'
        + '<div class="panel-verse-ref">John 1:' + num + '</div>'
        + '<div class="panel-verse-text">' + esc(text) + '</div>'
        + '</div>';

    if (!insight) {
        html += '<div class="panel-no-connections">No cross-tradition connections found for this verse.</div>';
    } else {
        insight.cards.forEach(function(card) {
            html += '<div class="insight-card">'
                + '<div class="card-tradition">' + esc(card.tradition) + '</div>'
                + '<div class="card-author">' + esc(card.author) + '</div>'
                + '<div class="card-date">' + esc(card.date) + '</div>'
                + '<div class="card-quote">' + esc(card.quote) + '</div>'
                + '<button class="card-source-link">' + esc(card.sourceLabel) + '</button>'
                + '</div>';
        });
    }

    body.innerHTML = html;
    body.scrollTop = 0;
}

function esc(s) {
    return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Select verse 1 on load
selectVerse(1, VERSES[0][1], INSIGHTS[1]);
</script>
</body>
</html>
