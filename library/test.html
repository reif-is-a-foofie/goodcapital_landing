<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>John 1 — Design Test</title>
<style>
:root {
    --bg: #FAF8F4;
    --panel-bg: #FEFCF8;
    --text: #2C2418;
    --muted: #7a6e60;
    --accent: #9C7A4D;
    --divider: rgba(0,0,0,0.08);
    --green: #4A6741;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
    font-family: -apple-system, 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: grid;
    grid-template-columns: 1fr 1fr;
    height: 100vh;
    overflow: hidden;
}

/* ── Reader ── */
#reader {
    overflow-y: auto;
    padding: 40px 40px 80px 48px;
    border-right: 1px solid var(--divider);
}
h1 { font-family: 'EB Garamond', Georgia, serif; font-size: 28px; font-weight: 400; color: var(--accent); margin-bottom: 4px; }
.chapter-label { font-size: 12px; color: var(--muted); margin-bottom: 36px; letter-spacing: .05em; text-transform: uppercase; }

.verse {
    display: grid; grid-template-columns: 28px 1fr; gap: 12px;
    margin-bottom: 14px; align-items: baseline; cursor: pointer;
    border-radius: 6px; padding: 4px 6px 4px 0; margin-left: -6px;
    transition: background .1s;
}
.verse:hover { background: rgba(156,122,77,0.06); }
.verse.active { background: rgba(156,122,77,0.1); }
.verse-num { font-size: 11px; font-weight: 600; color: var(--muted); text-align: right; padding-top: 3px; user-select: none; }
.verse.has-data .verse-num { color: var(--accent); }
.verse.active .verse-num { color: var(--accent); }
.verse-text { font-family: 'EB Garamond', Georgia, serif; font-size: 19px; line-height: 1.75; }

/* ── Panel ── */
#panel { display: flex; flex-direction: column; overflow: hidden; background: var(--panel-bg); }
#panel-body { flex: 1; overflow-y: auto; overscroll-behavior: contain; }

.panel-empty {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; padding: 40px; text-align: center; color: var(--muted);
}
.panel-empty-icon { font-size: 28px; margin-bottom: 16px; opacity: 0.35; }
.panel-empty-text { font-size: 13px; line-height: 1.7; max-width: 240px; }

.panel-header { padding: 24px 28px 18px; border-bottom: 1px solid var(--divider); flex-shrink: 0; }
.panel-verse-ref { font-size: 10px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; }
.panel-verse-text { font-family: 'EB Garamond', Georgia, serif; font-size: 15px; line-height: 1.65; color: var(--text); font-style: italic; }

.panel-section {
    font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
    color: var(--muted); padding: 14px 28px 10px;
    border-bottom: 1px solid var(--divider);
    background: rgba(0,0,0,0.018);
}

/* ── Greek/Hebrew words — stacked, not grid ── */
.word-card { padding: 16px 28px; border-bottom: 1px solid var(--divider); display: flex; gap: 16px; align-items: flex-start; }
.word-original { font-size: 28px; font-family: 'EB Garamond', Georgia, serif; font-weight: 400; line-height: 1; color: var(--text); flex-shrink: 0; min-width: 52px; }
.word-detail {}
.word-english  { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 5px; }
.word-meaning  { font-size: 14px; color: var(--text); line-height: 1.6; }

/* ── Commentary notes ── */
.note-card { padding: 20px 28px; border-bottom: 1px solid var(--divider); }
.note-body {
    font-family: 'EB Garamond', Georgia, serif;
    font-size: 16px; line-height: 1.8; color: var(--text);
    padding-left: 16px; border-left: 2px solid rgba(156,122,77,0.35);
}
.note-preview { display: block; }
.note-overflow { display: none; }
.note-card.expanded .note-overflow { display: inline; }
.note-more {
    display: inline-block; font-size: 12px; font-weight: 600; color: var(--accent);
    cursor: pointer; background: none; border: none; padding: 6px 0 0; margin-top: 4px;
}
.note-card.expanded .note-more { display: none; }

/* ── Attributed quotes ── */
.quote-card { padding: 20px 28px; border-bottom: 1px solid var(--divider); }
.quote-attr  { font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 12px; line-height: 1.5; }
.quote-type-gc  { color: #4a7090; }
.quote-type-jd  { color: #6a4a8c; }
.quote-text {
    font-family: 'EB Garamond', Georgia, serif;
    font-size: 16px; line-height: 1.8; color: var(--text); font-style: italic;
    padding-left: 16px; border-left: 2px solid rgba(156,122,77,0.25);
}
.quote-preview { display: block; }
.quote-overflow { display: none; }
.quote-card.expanded .quote-overflow { display: inline; }
.quote-more {
    display: inline-block; font-size: 12px; font-weight: 600; color: var(--accent);
    cursor: pointer; background: none; border: none; padding: 6px 0 0; margin-top: 4px;
}
.quote-card.expanded .quote-more { display: none; }

/* ── Scripture parallels ── */
.scrip-card { padding: 16px 28px; border-bottom: 1px solid var(--divider); }
.scrip-ref  { font-size: 12px; font-weight: 700; color: var(--green); margin-bottom: 7px; }
.scrip-text {
    font-family: 'EB Garamond', Georgia, serif;
    font-size: 16px; line-height: 1.75; color: var(--text); font-style: italic;
    padding-left: 16px; border-left: 2px solid rgba(74,103,65,0.3);
}

/* ── Historical voices ── */
.hist-card { padding: 20px 28px; border-bottom: 1px solid var(--divider); }
.hist-badge {
    display: inline-block; font-size: 11px; font-weight: 700; letter-spacing: .05em;
    text-transform: uppercase; color: var(--accent); background: rgba(156,122,77,0.1);
    border-radius: 4px; padding: 3px 8px; margin-bottom: 9px;
}
.hist-badge.gc  { color: #4a7090; background: rgba(74,112,144,0.1); }
.hist-author { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
.hist-work   { font-size: 12px; color: var(--muted); margin-bottom: 12px; }
.hist-quote  {
    font-family: 'EB Garamond', Georgia, serif;
    font-size: 16px; line-height: 1.8; color: var(--text); font-style: italic;
    padding-left: 16px; border-left: 2px solid rgba(156,122,77,0.3);
}

/* Mobile */
@media (max-width: 700px) {
    body { grid-template-columns: 1fr; grid-template-rows: 1fr auto; }
    #reader { padding: 24px 20px 40px; border-right: none; }
    #panel { max-height: 50vh; border-top: 1px solid var(--divider); }
}
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
</head>
<body>

<div id="reader">
    <h1>John</h1>
    <p class="chapter-label">Chapter 1 · Design Prototype</p>
    <div id="verses"></div>
</div>

<div id="panel">
    <div id="panel-body">
        <div class="panel-empty">
            <div class="panel-empty-icon">✦</div>
            <div class="panel-empty-text">Loading…</div>
        </div>
    </div>
</div>

<script>
var VERSES = [
    [1,  "In the beginning was the Word, and the Word was with God, and the Word was God."],
    [2,  "The same was in the beginning with God."],
    [3,  "All things were made by him; and without him was not any thing made that was made."],
    [4,  "In him was life; and the life was the light of men."],
    [5,  "And the light shineth in darkness; and the darkness comprehended it not."],
    [6,  "There was a man sent from God, whose name was John."],
    [7,  "The same came for a witness, to bear witness of the Light, that all men through him might believe."],
    [8,  "He was not that Light, but was sent to bear witness of that Light."],
    [9,  "That was the true Light, which lighteth every man that cometh into the world."],
    [10, "He was in the world, and the world was made by him, and the world knew him not."],
    [11, "He came unto his own, and his own received him not."],
    [12, "But as many as received him, to them gave he power to become the sons of God, even to them that believe on his name:"],
    [13, "Which were born, not of blood, nor of the will of the flesh, nor of the will of man, but of God."],
    [14, "And the Word was made flesh, and dwelt among us, (and we beheld his glory, the glory as of the only begotten of the Father,) full of grace and truth."],
    [15, "John bare witness of him, and cried, saying, This was he of whom I spake, He that cometh after me is preferred before me: for he was before me."],
    [16, "And of his fulness have all we received, and grace for grace."],
    [17, "For the law was given by Moses, but grace and truth came by Jesus Christ."],
    [18, "No man hath seen God at any time; the only begotten Son, which is in the bosom of the Father, he hath declared him."],
    [19, "And this is the record of John, when the Jews sent priests and Levites from Jerusalem to ask him, Who art thou?"],
    [20, "And he confessed, and denied not; but confessed, I am not the Christ."],
    [21, "And they asked him, What then? Art thou Elias? And he saith, I am not. Art thou that prophet? And he answered, No."],
    [22, "Then said they unto him, Who art thou? that we may give an answer to them that sent us. What sayest thou of thyself?"],
    [23, "He said, I am the voice of one crying in the wilderness, Make straight the way of the Lord, as said the prophet Esaias."],
    [24, "And they which were sent were of the Pharisees."],
    [25, "And they asked him, and said unto him, Why baptizest thou then, if thou be not that Christ, nor Elias, neither that prophet?"],
    [26, "John answered them, saying, I baptize with water: but there standeth one among you, whom ye know not;"],
    [27, "He it is, who coming after me is preferred before me, whose shoe's latchet I am not worthy to unloose."],
    [28, "These things were done in Bethabara beyond Jordan, where John was baptizing."],
    [29, "The next day John seeth Jesus coming unto him, and saith, Behold the Lamb of God, which taketh away the sin of the world."],
    [30, "This is he of whom I said, After me cometh a man which is preferred before me: for he was before me."],
    [31, "And I knew him not: but that he should be made manifest to Israel, therefore am I come baptizing with water."],
    [32, "And John bare record, saying, I saw the Spirit descending from heaven like a dove, and it abode upon him."],
    [33, "And I knew him not: but he that sent me to baptize with water, the same said unto me, Upon whom thou shalt see the Spirit descending, and remaining on him, the same is he which baptizeth with the Holy Ghost."],
    [34, "And I saw, and bare record that this is the Son of God."],
    [35, "Again the next day after John stood, and two of his disciples;"],
    [36, "And looking upon Jesus as he walked, he saith, Behold the Lamb of God!"],
    [37, "And the two disciples heard him speak, and they followed Jesus."],
    [38, "Then Jesus turned, and saw them following, and saith unto them, What seek ye? They said unto him, Rabbi, (which is to say, being interpreted, Master,) where dwellest thou?"],
    [39, "He saith unto them, Come and see. They came and saw where he dwelt, and abode with him that day: for it was about the tenth hour."],
    [40, "One of the two which heard John speak, and followed him, was Andrew, Simon Peter's brother."],
    [41, "He first findeth his own brother Simon, and saith unto him, We have found the Messias, which is, being interpreted, the Christ."],
    [42, "And he brought him to Jesus. And when Jesus beheld him, he said, Thou art Simon the son of Jona: thou shalt be called Cephas, which is by interpretation, A stone."],
    [43, "The day following Jesus would go forth into Galilee, and findeth Philip, and saith unto him, Follow me."],
    [44, "Now Philip was of Bethsaida, the city of Andrew and Peter."],
    [45, "Philip findeth Nathanael, and saith unto him, We have found him, of whom Moses in the law, and the prophets, did write, Jesus of Nazareth, the son of Joseph."],
    [46, "And Nathanael said unto him, Can there any good thing come out of Nazareth? Philip saith unto him, Come and see."],
    [47, "Jesus saw Nathanael coming to him, and saith of him, Behold an Israelite indeed, in whom is no guile!"],
    [48, "Nathanael saith unto him, Whence knowest thou me? Jesus answered and said unto him, Before that Philip called thee, when thou wast under the fig tree, I saw thee."],
    [49, "Nathanael answered and saith unto him, Rabbi, thou art the Son of God; thou art the King of Israel."],
    [50, "Jesus answered and said unto him, Because I said unto thee, I saw thee under the fig tree, believest thou? thou shalt see greater things than these."],
    [51, "And he saith unto him, Verily, verily, I say unto you, Hereafter ye shall see heaven open, and the angels of God ascending and descending upon the Son of man."]
];

// ── State ─────────────────────────────────────────────────────────────────────
var donaldsonData  = {};   // verseNum (string) → [para, ...]
var discoveryData  = {};   // verseNum (int)    → [{...}]  — filtered, verse-specific only
var scriptureData  = {};   // verseNum (int)    → [{ref, text}]
var activeVerse    = null;

// Sources that produce one paragraph for many verses (chapter-level noise)
var SKIP_SOURCES = ['millennial_star'];

// Passage text prefixes that repeat across many verses — suppress
var REPEAT_PREFIXES = [
    'in  the  opening  lines',
    'q. was it by the father',
    'the lights were immediately extinguished',
];

function isRepeat(text) {
    if (!text) return false;
    var t = text.toLowerCase().trim();
    return REPEAT_PREFIXES.some(function(p) { return t.indexOf(p) === 0; });
}

function cleanText(t) {
    return (t || '').replace(/  +/g, ' ').replace(/\n\s*/g, ' ').trim();
}

// ── Author parsing ────────────────────────────────────────────────────────────
function parseCard(entry) {
    var lb  = entry.source_label || '';
    var src = entry.source || '';

    // GC: "GC YYYY/MM — Speaker Name"
    var gcM = lb.match(/GC\s+(\d{4})\/(\d{2})\s*[—-]\s*(.+)/);
    if (gcM) {
        var mo = ['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][parseInt(gcM[2],10)] || gcM[2];
        return { author: gcM[3].trim(), work: 'General Conference, ' + mo + ' ' + gcM[1], badgeClass: 'gc', badge: 'General Conference' };
    }
    // JD: "JD Vol N"
    var jdM = lb.match(/JD Vol\s*(\d+)/i);
    if (jdM) return { author: 'Journal of Discourses', work: 'Volume ' + jdM[1], badgeClass: '', badge: 'LDS Historical' };
    // HoC
    if (lb.startsWith('HoC:')) return { author: 'History of the Church', work: lb.replace('HoC:','').trim(), badgeClass: 'hoc', badge: 'LDS Historical' };
    // Brigham Young
    if ((entry.source_doc_id||'').indexOf('brigham_young') !== -1 || lb.indexOf('brigham_young') !== -1)
        return { author: 'Brigham Young', work: 'Discourses of Brigham Young', badgeClass: '', badge: 'LDS Historical' };
    // Augustine
    if ((entry.source_doc_id||'').indexOf('anti_pelagian') !== -1 || lb.toLowerCase().indexOf('anti-pelagian') !== -1)
        return { author: 'Augustine of Hippo', work: 'Anti-Pelagian Writings', badgeClass: '', badge: 'Church Fathers' };
    // Ante-Nicene Fathers
    if ((entry.source_doc_id||'').indexOf('ante_nicene') !== -1 || lb.toLowerCase().indexOf('ante-nicene') !== -1 || lb.toLowerCase().indexOf('ante_nicene') !== -1)
        return { author: 'Ante-Nicene Fathers', work: '', badgeClass: '', badge: 'Church Fathers' };
    // Times & Seasons
    if (src === 'times_and_seasons') return { author: 'Times and Seasons', work: lb.replace(/Times & Seasons:/,'').trim(), badgeClass: '', badge: 'LDS Historical' };

    // Fallback
    var badge = (entry.tradition_pair || '').split('→').pop().trim();
    var author = lb.replace(/^(LDS Historical|Church Fathers|Pioneer Journals):\s*/i,'')
                   .replace(/_/g,' ').replace(/\b\w/g, function(c){ return c.toUpperCase(); }).slice(0,60);
    return { author: author, work: '', badgeClass: '', badge: badge };
}

// ── Load data ─────────────────────────────────────────────────────────────────
Promise.all([
    fetch('./donaldson/john_1.json').then(function(r){ return r.ok ? r.json() : {}; }).catch(function(){ return {}; }),
    fetch('./verse_discovery.json').then(function(r){ return r.ok ? r.json() : {}; }).catch(function(){ return {}; }),
    fetch('./chapters/john_1_graph.json').then(function(r){ return r.ok ? r.json() : null; }).catch(function(){ return null; })
]).then(function(results) {
    donaldsonData = results[0] || {};

    // ── verse_discovery: filter to John 1, suppress chapter-level passages ──
    var discovery = results[1] || {};

    // First pass: count how many verses each passage text appears in
    var textCount = {};
    Object.keys(discovery).forEach(function(ref) {
        if (!ref.startsWith('John 1:')) return;
        (discovery[ref] || []).forEach(function(e) {
            var key = (e.source_text || '').slice(0, 60).toLowerCase();
            textCount[key] = (textCount[key] || 0) + 1;
        });
    });

    Object.keys(discovery).forEach(function(ref) {
        if (!ref.startsWith('John 1:')) return;
        var vNum = parseInt(ref.split(':')[1], 10);
        var entries = (discovery[ref] || []).filter(function(e) {
            if (SKIP_SOURCES.indexOf(e.source || '') !== -1) return false;
            var text = cleanText(e.source_text);
            if (text.length < 20) return false;
            if (isRepeat(text)) return false;
            // Suppress passages that appear in 4+ verses (not verse-specific)
            var key = text.slice(0, 60).toLowerCase();
            if ((textCount[key] || 0) >= 4) return false;
            return true;
        });
        if (entries.length) discoveryData[vNum] = entries;
    });

    // ── scripture echoes from chapter graph ──
    var graph = results[2];
    if (graph) {
        var nodeMap  = {}, verseMap = {};
        (graph.nodes || []).forEach(function(n) { nodeMap[n.id] = n; if (n.t === 'v') verseMap[n.id] = n; });
        (graph.edges || []).forEach(function(edge) {
            if ((edge.w || 0) < 0.75) return;
            var vn = verseMap[edge.s], pn = nodeMap[edge.t];
            if (!vn || !pn || pn.src !== 'standard_works') return;
            var ref = (pn.lb || '').trim();
            if (ref.startsWith('John 1:')) return;
            var vNum = vn.n;
            if (!scriptureData[vNum]) scriptureData[vNum] = [];
            if (!scriptureData[vNum].some(function(x){ return x.ref === ref; })) {
                scriptureData[vNum].push({ ref: ref, text: cleanText(pn.x || ''), score: edge.w || 0 });
            }
        });
        Object.keys(scriptureData).forEach(function(v) {
            scriptureData[v].sort(function(a,b){ return b.score - a.score; });
        });
    }

    renderVerses();
    selectVerse(VERSES[0][0], VERSES[0][1]);
});

// ── Render ────────────────────────────────────────────────────────────────────
function renderVerses() {
    var container = document.getElementById('verses');
    container.innerHTML = '';
    VERSES.forEach(function(row) {
        var num = row[0], text = row[1];
        var d = donaldsonData[String(num)] || {};
    var hasData = !!(d.notes || d.words || d.quotes || discoveryData[num] || scriptureData[num]);
        var div = document.createElement('div');
        div.className = 'verse' + (hasData ? ' has-data' : '');
        div.id = 'v' + num;
        var ns = document.createElement('span'); ns.className = 'verse-num'; ns.textContent = num;
        var ts = document.createElement('span'); ts.className = 'verse-text'; ts.textContent = text;
        div.appendChild(ns); div.appendChild(ts);
        div.addEventListener('click', function() { selectVerse(num, text); });
        container.appendChild(div);
    });
}

var PREVIEW_LEN = 320;  // chars before "Read more →"

function expandCard(btn) {
    btn.closest('.note-card, .quote-card').classList.add('expanded');
}

function makeExpandable(text, previewClass, overflowClass, moreClass) {
    if (text.length <= PREVIEW_LEN) {
        return '<span class="' + previewClass + '">' + esc(text) + '</span>';
    }
    // Split at a word boundary near PREVIEW_LEN
    var cut = text.lastIndexOf(' ', PREVIEW_LEN) || PREVIEW_LEN;
    return '<span class="' + previewClass + '">' + esc(text.slice(0, cut)) + '</span>'
        + '<span class="' + overflowClass + '">' + esc(text.slice(cut)) + '</span>'
        + '<button class="' + moreClass + '" onclick="expandCard(this)">Read more →</button>';
}

function selectVerse(num, text) {
    if (activeVerse) activeVerse.classList.remove('active');
    activeVerse = document.getElementById('v' + num);
    if (activeVerse) activeVerse.classList.add('active');

    var donaEntry  = donaldsonData[String(num)] || {};
    var historical = discoveryData[num]          || [];
    var scripture  = scriptureData[num]          || [];
    var body       = document.getElementById('panel-body');
    var html       = '';

    var words  = donaEntry.words  || [];
    var notes  = donaEntry.notes  || [];
    var quotes = donaEntry.quotes || [];

    html += '<div class="panel-header">'
        + '<div class="panel-verse-ref">John 1:' + num + '</div>'
        + '<div class="panel-verse-text">' + esc(text) + '</div>'
        + '</div>';

    var hasAny = words.length || notes.length || quotes.length || historical.length || scripture.length;
    if (!hasAny) {
        html += '<div style="padding:28px;color:var(--muted);font-size:13px">No commentary found for this verse.</div>';
    }

    // ── Greek/Hebrew word studies ──
    if (words.length) {
        html += '<div class="panel-section">Key Words</div>';
        words.forEach(function(w) {
            html += '<div class="word-card">'
                + '<div class="word-original">' + esc(w.greek) + '</div>'
                + '<div class="word-detail">'
                + '<div class="word-english">' + esc(w.word) + '</div>'
                + '<div class="word-meaning">' + makeExpandable(w.meaning, 'note-preview', 'note-overflow', 'note-more') + '</div>'
                + '</div></div>';
        });
    }

    // ── Donaldson notes ──
    if (notes.length) {
        html += '<div class="panel-section">Lee Donaldson · Commentary</div>';
        notes.forEach(function(para) {
            html += '<div class="note-card">'
                + '<div class="note-body">'
                + makeExpandable(para, 'note-preview', 'note-overflow', 'note-more')
                + '</div></div>';
        });
    }

    // ── Attributed quotes (Donaldson citing others) ──
    if (quotes.length) {
        html += '<div class="panel-section">From the Sources</div>';
        quotes.forEach(function(q) {
            var typeClass = 'quote-type-' + (q.type || 'other');
            html += '<div class="quote-card">'
                + '<div class="quote-attr ' + typeClass + '">' + esc(q.attr) + '</div>'
                + '<div class="quote-text">'
                + makeExpandable(q.text, 'quote-preview', 'quote-overflow', 'quote-more')
                + '</div></div>';
        });
    }

    // ── Cross-tradition voices ──
    if (historical.length) {
        html += '<div class="panel-section">Voices from History</div>';
        historical.forEach(function(entry) {
            var meta = parseCard(entry);
            var qt   = cleanText(entry.source_text);
            html += '<div class="hist-card">'
                + '<div class="hist-badge ' + (meta.badgeClass || '') + '">' + esc(meta.badge) + '</div>'
                + '<div class="hist-author">' + esc(meta.author) + '</div>'
                + (meta.work ? '<div class="hist-work">' + esc(meta.work) + '</div>' : '')
                + '<div class="hist-quote">'
                + makeExpandable(qt, 'quote-preview', 'quote-overflow', 'quote-more')
                + '</div></div>';
        });
    }

    // ── Scripture echoes ──
    if (scripture.length) {
        html += '<div class="panel-section">Scripture Echoes</div>';
        scripture.forEach(function(s) {
            html += '<div class="scrip-card">'
                + '<div class="scrip-ref">' + esc(s.ref) + '</div>'
                + '<div class="scrip-text">' + esc(s.text) + '</div>'
                + '</div>';
        });
    }

    body.innerHTML = html;
    body.scrollTop = 0;
}

function esc(s) {
    return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
