<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LDS Scriptures — The Good Project</title>
    <link rel="apple-touch-icon" sizes="180x180" href="../assets/icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="../assets/icons/favicon-32x32.png">
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#9C7A4D">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-PCMWDK746H"></script>
    <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-PCMWDK746H');</script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=EB+Garamond:wght@400;700&display=swap" rel="stylesheet">
    <style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
    --bg: #F5F2EC;
    --text: #1C1C1C;
    --muted: #6C6C6C;
    --accent: #9C7A4D;
    --accent-hover: #7a5e38;
    --divider: rgba(0,0,0,0.09);
    --nav-h: 52px;
    --toc-w: 340px;
    --reader-max: 760px;
}
html, body { height: 100%; background: var(--bg); color: var(--text);
    font-family: 'Inter', -apple-system, sans-serif; -webkit-font-smoothing: antialiased; overflow: hidden; }

/* ── Nav ── */
#topbar {
    position: fixed; top: 0; left: 0; right: 0; height: var(--nav-h);
    background: var(--bg); border-bottom: 1px solid var(--divider);
    display: flex; align-items: center; padding: 0 14px; gap: 10px; z-index: 200;
}
#toc-btn { background: none; border: none; cursor: pointer; padding: 6px; border-radius: 6px;
    color: var(--muted); display: flex; align-items: center; }
#toc-btn:hover { background: rgba(0,0,0,0.06); color: var(--text); }
#topbar .logo { font-weight: 600; font-size: 14px; letter-spacing: -0.04em;
    color: var(--accent); text-decoration: none; margin-right: auto; }
#location-label { font-size: 12px; color: var(--muted); max-width: 200px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
/* ── Search button ── */
#search-btn { background: none; border: none; cursor: pointer; padding: 6px; border-radius: 6px;
    color: var(--muted); display: flex; align-items: center; }
#search-btn:hover { background: rgba(0,0,0,0.06); color: var(--text); }

/* ── Shell ── */
#shell { position: fixed; top: var(--nav-h); left: 0; right: 0; bottom: 0; display: flex; }

/* ── TOC ── */
#toc {
    width: var(--toc-w); min-width: var(--toc-w); background: #FEFCF8;
    border-right: 1px solid var(--divider); display: flex; flex-direction: column;
    transition: width .2s, min-width .2s; overflow: hidden;
}
#toc.hidden { width: 0; min-width: 0; pointer-events: none; }
#toc-head {
    padding: 12px 14px 10px; border-bottom: 1px solid var(--divider);
    flex-shrink: 0; display: flex; align-items: flex-start; gap: 8px;
}
#toc-back {
    border: 1px solid rgba(156,122,77,0.18); background: rgba(255,255,255,0.82);
    color: var(--accent); border-radius: 8px; width: 30px; height: 30px; cursor: pointer;
    display: none; align-items: center; justify-content: center; flex-shrink: 0;
}
#toc-back.show { display: flex; }
#toc-back:hover { background: rgba(156,122,77,0.08); }
#toc-head-copy { min-width: 0; flex: 1; }
#toc-title { font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }
#toc-subtitle { margin-top: 4px; font-size: 12px; color: var(--text); line-height: 1.25; }
#toc-subtitle:empty { display: none; }
#toc-scroll { flex: 1; overflow-y: auto; padding: 12px; }
#toc-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px;
}
#toc-grid.chapter-grid {
    grid-template-columns: repeat(4, minmax(0, 1fr));
}
.toc-tile {
    border: 1px solid rgba(156,122,77,0.14); border-radius: 12px;
    background: rgba(255,255,255,0.82); padding: 12px 10px; min-height: 78px;
    cursor: pointer; transition: transform .12s, border-color .12s, background .12s, box-shadow .12s;
    display: flex; flex-direction: column; justify-content: space-between; gap: 8px;
}
.toc-tile:hover {
    transform: translateY(-1px); border-color: rgba(156,122,77,0.34);
    background: rgba(156,122,77,0.08); box-shadow: 0 8px 18px rgba(0,0,0,0.04);
}
.toc-tile.active {
    background: var(--accent); border-color: var(--accent); color: #fff;
}
.toc-tile-title { font-size: 13px; line-height: 1.2; font-weight: 600; color: var(--text); }
.toc-tile.active .toc-tile-title { color: #fff; }
.toc-tile-meta { font-size: 10px; line-height: 1.2; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); }
.toc-tile.active .toc-tile-meta { color: rgba(255,255,255,0.82); }
.toc-tile.chapter-tile {
    min-height: 0;
    aspect-ratio: 1 / 1;
    padding: 0;
    align-items: center;
    justify-content: center;
    text-align: center;
}
.toc-tile.book-tile {
    min-height: 58px;
    padding: 10px 8px;
    align-items: center;
    justify-content: center;
    text-align: center;
}
.toc-tile.book-tile .toc-tile-title { font-size: 12.5px; }
.toc-tile.chapter-tile .toc-tile-title { font-size: 14px; }
.toc-tile.wide { grid-column: 1 / -1; }
.toc-note {
    grid-column: 1 / -1;
    border: 1px solid rgba(156,122,77,0.14);
    border-radius: 12px;
    background: rgba(255,255,255,0.82);
    padding: 12px 12px 13px;
}
.toc-note-label {
    display: block;
    margin-bottom: 6px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--accent);
}
.toc-note p {
    margin: 0;
    font-size: 12px;
    line-height: 1.5;
    color: var(--muted);
}
.toc-note a {
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px solid rgba(156,122,77,0.25);
}

/* ── Reader ── */
#reader { flex: 1; overflow-y: auto; overflow-x: hidden; background: var(--bg); }
#content { max-width: var(--reader-max); margin: 0 auto; padding: 40px 32px 120px; }
.chapter-block { margin-bottom: 3em; }
#sentinel { height: 60px; }

/* ── Highlight tooltip ── */
#hl-tip {
    position: fixed; background: #2a1f14; color: #fff;
    border-radius: 6px; padding: 6px 12px; font-size: 12px; font-weight: 500;
    cursor: pointer; z-index: 500; display: none; white-space: nowrap;
    box-shadow: 0 2px 12px rgba(0,0,0,0.25);
}
#hl-tip:hover { background: #3d2b1f; }

/* Highlights rendered inside chapter iframes need this injected */
.hl-yellow { background: rgba(255,220,50,0.45); border-radius: 2px; }
.hl-green  { background: rgba(100,200,120,0.4); border-radius: 2px; }
.hl-blue   { background: rgba(100,160,240,0.4); border-radius: 2px; }

/* ── Search panel ── */
#search-panel {
    position: fixed; top: var(--nav-h); left: 0;
    width: var(--toc-w); bottom: 0; background: #FEFCF8;
    border-right: 1px solid var(--divider); display: flex; flex-direction: column;
    z-index: 160; transform: translateX(-100%); transition: transform .2s;
}
#search-panel.open { transform: translateX(0); }

#search-input-wrap {
    padding: 10px 12px; border-bottom: 1px solid var(--divider); flex-shrink: 0;
    display: flex; align-items: center; gap: 6px;
}
#search-input {
    flex: 1; border: none; background: transparent; font-size: 13px;
    color: var(--text); outline: none; font-family: inherit;
}
#search-input::placeholder { color: var(--muted); }
#search-close {
    background: none; border: none; cursor: pointer; color: var(--muted);
    padding: 2px; border-radius: 4px; display: flex; align-items: center; flex-shrink: 0;
}
#search-close:hover { color: var(--text); background: rgba(0,0,0,0.06); }
#search-status { padding: 8px 12px; font-size: 11px; color: var(--muted); flex-shrink: 0; }
#search-results { flex: 1; overflow-y: auto; }

.search-result {
    padding: 9px 12px; cursor: pointer; border-bottom: 1px solid var(--divider);
    font-size: 12px; line-height: 1.45;
}
.search-result:hover { background: rgba(0,0,0,0.04); }
.search-result-ref {
    font-weight: 600; color: var(--accent); margin-bottom: 3px; font-size: 11px;
}
.search-result-text { color: var(--text); }
.search-hl { background: rgba(156,122,77,0.22); border-radius: 2px; font-weight: 500; }

/* ── Loading state ── */
#splash { position: fixed; inset: 0; background: var(--bg); display: flex;
    flex-direction: column; align-items: center; justify-content: center; gap: 14px; z-index: 400; }
#splash.gone { display: none; }
.spin { width: 28px; height: 28px; border: 3px solid rgba(156,122,77,.2);
    border-top-color: var(--accent); border-radius: 50%; animation: sp .7s linear infinite; }
@keyframes sp { to { transform: rotate(360deg); } }
#splash p { font-size: 13px; color: var(--muted); }

@media (max-width: 600px) {
    :root { --toc-w: 300px; }
    #toc { position: fixed; top: var(--nav-h); left: 0; bottom: 0; z-index: 150; }
    #search-panel { z-index: 162; }
    #location-label { display: none; }
    #content { padding: 24px 18px 80px; }
    #toc-grid { grid-template-columns: 1fr; }
    #toc-grid.chapter-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
}

/* ── Offline badge ── */
#offline-badge { display: none; font-size: 11px; color: #9C7A4D; padding: 2px 8px;
    border: 1px solid currentColor; border-radius: 10px; }

/* ── Word spans (critical word underlines) ── */
.scripture .score-legend { display: none !important; }
.scripture div.verse {
    display: grid;
    grid-template-columns: 34px minmax(0, 1fr);
    column-gap: 14px;
    align-items: start;
}
.scripture div.verse:first-of-type {
    margin-top: 0.8em;
}
.scripture span.verse-num {
    display: block;
    min-width: 0;
    margin-right: 0;
    font-size: 1.05rem;
    line-height: 1.5;
    text-align: right;
    opacity: 0.88;
}
.scripture span.verse-num::after {
    content: '';
}
.scripture div.verse.expanded span.verse-num::after {
    content: '';
}
.scripture span.verse-text {
    display: block;
    font-size: 1.12rem;
    line-height: 1.78;
}
.scripture div.verse > .jst-block,
.scripture div.verse > .etymology-block,
.scripture div.verse > .rabbinical-block,
.scripture div.verse > .lds-commentary-block,
.scripture div.verse > .fathers-block,
.scripture div.verse > .ancient-block,
.scripture div.verse > .donaldson-block,
.scripture div.verse > .jsp-block,
.scripture div.verse > .semantic-quote,
.scripture div.verse > .semantic-block,
.scripture div.verse > .backlinks {
    grid-column: 2 / -1;
    min-width: 0;
    margin-left: 0;
}
.scripture .semantic-meta > .score-dots:last-child {
    display: none;
}
.scripture .jst-block,
.scripture .lds-commentary-block,
.scripture .donaldson-block,
.scripture .semantic-quote,
.scripture .semantic-block,
.scripture .ancient-block,
.scripture .fathers-block,
.scripture .jsp-block,
.scripture .rabbinical-block,
.scripture .etymology-block {
    margin-top: 10px;
    padding: 10px 12px;
    border-left: 2px solid rgba(156,122,77,0.18);
    background: transparent;
    box-shadow: none;
    border-radius: 0;
}
.scripture .source-label,
.scripture .semantic-source,
.scripture .semantic-ref,
.scripture .vol-ref,
.scripture .backlinks-label {
    font-size: 10px;
    line-height: 1.3;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--muted);
}
.scripture .jst-text,
.scripture .jd-quote,
.scripture .gc-quote,
.scripture .fathers-quote,
.scripture .ancient-quote,
.scripture .donaldson-para,
.scripture .semantic-text {
    margin-top: 5px;
    font-size: 14px;
    line-height: 1.62;
    color: #3b342d;
}
.scripture .donaldson-para + .donaldson-para,
.scripture .jd-quote + .jd-quote,
.scripture .gc-quote + .gc-quote,
.scripture .ancient-quote + .ancient-quote,
.scripture .fathers-quote + .fathers-quote {
    margin-top: 8px;
}
.scripture .semantic-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 4px;
}
.scripture .score-dots {
    font-size: 8px;
    letter-spacing: 1px;
    color: rgba(156,122,77,0.38);
}
.scripture .backlinks {
    margin-top: 6px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
}
.scripture a.ref-link,
.scripture a.backlink-ref {
    color: var(--accent);
    text-decoration: underline;
    text-decoration-thickness: 1px;
    text-underline-offset: 2px;
}
.scripture a.ref-link:hover,
.scripture .backlink-ref:hover {
    color: #76572f;
}
.scripture span.w {
    cursor: pointer;
    text-decoration: underline;
    text-decoration-color: rgba(156,122,77, calc(var(--ws,0.5) * 0.45 + 0.38));
    text-decoration-thickness: calc(var(--ws,0.5) * 1.4px + 1.1px);
    text-underline-offset: 3px;
    border-radius: 2px;
    transition: background .1s;
}
.scripture span.w:hover { background: rgba(156,122,77,0.13); }
.scripture span.w.cw-active { background: rgba(156,122,77,0.22); }
.scripture span.w[data-st="god"],
.scripture span.w[data-st="heaven"],
.scripture span.w[data-st="earth"] {
    text-decoration-thickness: max(1.8px, calc(var(--ws,0.5) * 1.4px + 1.2px));
}
.verse.verse-focus {
    background: rgba(156,122,77,0.06);
    box-shadow: inset 3px 0 0 var(--accent);
    border-radius: 8px;
}
#morsel-preview {
    max-width: var(--reader-max);
    margin: 0 auto 28px;
    border: 1px solid rgba(156,122,77,0.16);
    border-radius: 14px;
    background: #fffdf9;
    box-shadow: 0 10px 24px rgba(0,0,0,0.04);
    overflow: hidden;
}
#morsel-preview[hidden] { display: none; }
.morsel-preview-head {
    display: flex; align-items: center; gap: 8px;
    padding: 12px 14px; border-bottom: 1px solid var(--divider);
}
.morsel-preview-kicker {
    font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--muted);
}
.morsel-preview-title {
    font-size: 13px; font-weight: 600; color: var(--text);
}
.morsel-preview-body {
    padding: 14px;
    font-size: 15px;
    line-height: 1.7;
    color: var(--text);
}
.source-doc {
    max-width: 760px;
    margin: 0 auto;
    padding: 8px 0 40px;
}
.source-kicker {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: #9C7A4D;
    margin-bottom: 10px;
}
.source-title {
    font-family: 'EB Garamond', Georgia, serif;
    font-size: 34px;
    line-height: 1.08;
    margin: 0 0 20px;
    color: #26221d;
}
.source-para {
    font-size: 18px;
    line-height: 1.78;
    color: #2f2a24;
    margin: 0 0 18px;
}
.source-para-focus {
    background: rgba(156,122,77,0.12);
    box-shadow: inset 3px 0 0 var(--accent), 0 0 0 1px rgba(156,122,77,0.18);
    border-radius: 8px;
    padding-left: 8px;
    margin-left: -8px;
}

/* ── Channel panel ── */
#channel {
    position: fixed; top: var(--nav-h); right: 0; bottom: 0;
    width: 360px; background: #FEFCF8; border-left: 1px solid var(--divider);
    display: flex; flex-direction: column; z-index: 180;
    transform: translateX(100%); transition: transform .22s;
    box-shadow: -4px 0 20px rgba(0,0,0,0.06);
    min-height: 0;
}
#channel.open { transform: translateX(0); }
#ch-header {
    padding: 12px 14px 10px; border-bottom: 1px solid var(--divider);
    display: flex; align-items: flex-start; gap: 8px; flex-shrink: 0;
}
#ch-word {
    flex: 1; font-size: 18px; font-weight: 700; color: var(--accent);
    font-family: 'EB Garamond', Georgia, serif; letter-spacing: -0.02em;
    line-height: 1.2;
}
#ch-study {
    margin-top: 10px;
    padding: 10px 12px;
    border: 1px solid rgba(156,122,77,0.16);
    border-radius: 12px;
    background: #fffdf9;
}
#ch-study[hidden] { display: none; }
.ch-study-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
}
.ch-study-entry + .ch-study-entry {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid rgba(0,0,0,0.05);
}
.ch-study-line {
    font-size: 13px;
    line-height: 1.45;
    color: var(--text);
}
.ch-study-num { font-weight: 700; color: var(--accent); }
.ch-study-lemma { font-weight: 600; }
.ch-study-def {
    margin-top: 4px;
    font-size: 12px;
    line-height: 1.55;
    color: #52493f;
}
#ch-hint { font-size: 10px; color: var(--muted); margin-top: 4px; }
#ch-close {
    background: none; border: none; cursor: pointer; padding: 4px;
    border-radius: 5px; color: var(--muted); flex-shrink: 0; display: flex;
}
#ch-close:hover { background: rgba(0,0,0,0.07); color: var(--text); }
#ch-list {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    overscroll-behavior: contain;
    -webkit-overflow-scrolling: touch;
    touch-action: pan-y;
}
.ch-morsel {
    padding: 12px 14px; border-bottom: 1px solid var(--divider);
    cursor: pointer; transition: background .1s;
}
.ch-morsel:hover { background: rgba(0,0,0,0.03); }
.ch-morsel.ch-current { background: rgba(156,122,77,0.07); border-left: 3px solid var(--accent); padding-left: 11px; }
.ch-morsel-src {
    display: flex; align-items: center; gap: 6px; margin-bottom: 5px;
}
.ch-src-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.ch-src-name { font-size: 10px; font-weight: 600; letter-spacing: .07em;
    text-transform: uppercase; color: var(--muted); }
.ch-score-dots { font-size: 9px; color: var(--muted); margin-left: auto; letter-spacing: 1px; }
.ch-morsel-text {
    font-size: 12.5px; line-height: 1.55; color: var(--text);
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
    overflow: hidden;
}
.ch-morsel.ch-current .ch-morsel-text { -webkit-line-clamp: unset; }
.ch-expand {
    margin-top: 6px; font-size: 11px; color: var(--accent); cursor: pointer;
    background: none; border: none; padding: 0; font-family: inherit;
}
.ch-expand:hover { text-decoration: underline; }
.ch-actions {
    margin-top: 8px;
    display: flex;
    align-items: center;
    gap: 10px;
}
.ch-open-context {
    appearance: none;
    border: 1px solid rgba(156,122,77,0.22);
    background: rgba(156,122,77,0.08);
    color: var(--accent);
    border-radius: 999px;
    padding: 5px 10px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .02em;
    cursor: pointer;
    font-family: inherit;
}
.ch-open-context:hover {
    background: rgba(156,122,77,0.14);
}
.ch-full-text {
    margin-top: 8px; font-size: 12.5px; line-height: 1.6; color: var(--text);
    border-top: 1px solid var(--divider); padding-top: 8px;
    display: none;
}
.ch-full-text.open { display: block; }
.ch-empty { padding: 24px 14px; font-size: 12px; color: var(--muted); }

@media (max-width: 600px) {
    #channel { width: 100%; top: auto; height: 55vh; border-left: none;
        border-top: 1px solid var(--divider);
        transform: translateY(100%); transition: transform .22s; }
    #channel.open { transform: translateY(0); }
    #ch-list {
        padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 10px);
    }
}

/* ── Graph panel ── */
#graph-panel {
    position: fixed; inset: 0; background: var(--bg);
    z-index: 300; display: flex; flex-direction: column;
    transform: translateY(100%); transition: transform .25s;
}
#graph-panel.open { transform: translateY(0); }
#graph-header {
    height: var(--nav-h); display: flex; align-items: center;
    padding: 0 14px; gap: 10px; border-bottom: 1px solid var(--divider);
    flex-shrink: 0;
}
#graph-title { font-size: 13px; font-weight: 600; color: var(--text); }
#graph-chapter-label { font-size: 12px; color: var(--muted); margin-right: auto; }
#graph-close { background: none; border: none; cursor: pointer; padding: 6px;
    border-radius: 6px; color: var(--muted); display: flex; align-items: center; }
#graph-close:hover { background: rgba(0,0,0,0.06); color: var(--text); }
#graph-body { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
#graph-svg-wrap { flex: 1; overflow: hidden; position: relative; }
#graph-svg { width: 100%; height: 100%; cursor: grab; }
#graph-svg:active { cursor: grabbing; }
#graph-legend { display: flex; flex-wrap: wrap; gap: 6px 14px; padding: 8px 14px;
    border-top: 1px solid var(--divider); flex-shrink: 0; font-size: 11px; color: var(--muted); }
.gl-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%;
    margin-right: 4px; vertical-align: middle; }
#graph-tip {
    position: absolute; max-width: 300px; background: #1a1a1a; color: #f0ece4;
    border-radius: 8px; padding: 10px 13px; font-size: 12px; line-height: 1.55;
    z-index: 10; pointer-events: none; display: none;
    box-shadow: 0 4px 20px rgba(0,0,0,0.35);
}
#graph-tip .gt-src { font-size: 10px; font-weight: 600; letter-spacing: .08em;
    text-transform: uppercase; margin-bottom: 5px; opacity: 0.6; }
    </style>
</head>
<body>

<div id="splash"><div class="spin"></div><p>Loading…</p></div>

<div id="topbar">
    <button id="toc-btn" onclick="toggleToc()">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <line x1="3" y1="5" x2="15" y2="5"/><line x1="3" y1="9" x2="15" y2="9"/><line x1="3" y1="13" x2="11" y2="13"/>
        </svg>
    </button>
    <a id="site-home" href="../index.html" class="logo">The Good Project</a>
    <span id="location-label"></span>
    <button id="search-btn" onclick="openSearch()" title="Search scriptures">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="8" cy="8" r="5"/><line x1="12" y1="12" x2="16" y2="16"/>
        </svg>
    </button>
    <span id="offline-badge">Offline</span>
</div>

<!-- Search panel overlays the TOC area -->
<div id="search-panel">
    <div id="search-input-wrap">
        <svg width="14" height="14" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;color:var(--muted)">
            <circle cx="8" cy="8" r="5"/><line x1="12" y1="12" x2="16" y2="16"/>
        </svg>
        <input id="search-input" type="search" placeholder="Search scriptures and sources…" autocomplete="off" spellcheck="false">
        <button id="search-close" onclick="closeSearch()" title="Close search">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <line x1="2" y1="2" x2="12" y2="12"/><line x1="12" y1="2" x2="2" y2="12"/>
            </svg>
        </button>
    </div>
    <div id="search-status"></div>
    <div id="search-results"></div>
</div>

<div id="shell">
    <div id="toc" class="hidden">
        <div id="toc-head">
            <button id="toc-back" onclick="tocBack()" aria-label="Back">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="9 2 4 7 9 12"></polyline>
                </svg>
            </button>
            <div id="toc-head-copy">
                <div id="toc-title">Contents</div>
                <div id="toc-subtitle">Choose a standard work</div>
            </div>
        </div>
        <div id="toc-scroll"><div id="toc-grid"></div></div>
    </div>
    <div id="reader">
        <div id="content"></div>
        <div id="morsel-preview" hidden></div>
        <div id="sentinel"></div>
    </div>
</div>

<div id="graph-panel">
    <div id="graph-header">
        <button id="graph-close" onclick="closeGraph()">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <line x1="2" y1="2" x2="14" y2="14"/><line x1="14" y1="2" x2="2" y2="14"/>
            </svg>
        </button>
        <span id="graph-title">Cross-reference Graph</span>
        <span id="graph-chapter-label"></span>
    </div>
    <div id="graph-body">
        <div id="graph-svg-wrap">
            <svg id="graph-svg"></svg>
            <div id="graph-tip"></div>
        </div>
        <div id="graph-legend"></div>
    </div>
</div>

<div id="channel">
    <div id="ch-header">
        <div style="flex:1">
            <div id="ch-word"></div>
            <div id="ch-hint">space → next · click any word to explore</div>
            <div id="ch-study" hidden></div>
        </div>
        <button id="ch-close" onclick="closeChannel()">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <line x1="2" y1="2" x2="12" y2="12"/><line x1="12" y1="2" x2="2" y2="12"/>
            </svg>
        </button>
    </div>
    <div id="ch-list"></div>
</div>

<div id="hl-tip">✦ Highlight</div>

<script>
// ── Site config (override to white-label) ────────────────────────────────
var SITE = {
    name:       'The Good Project',
    homeUrl:    '../index.html',
    storageKey: 'lds',          // localStorage prefix
};

// Apply site config to DOM
(function() {
    var el = document.getElementById('site-home');
    if (el) { el.textContent = SITE.name; el.href = SITE.homeUrl; }
})();

// ── State ────────────────────────────────────────────────────────────────
var tocData = [];
var sourceTocData = [];
var tocTree = { front: null, volumes: [], sources: [] };
var chapterMeta = {};
var sourceMeta = {};
var tocPath = { level: 'root', volume: null, book: null, sourceCollection: null };
var chapterOrder = [];          // ordered array of chapter ids
var loadedChapters = new Set(); // ids already in DOM
var loadedNotes = new Set();    // ids whose notes have been fetched
var currentChapter = null;
var currentSourceDoc = null;
var sourceMode = false;
var tocOpen = false;
var nextToLoad = 0;             // index into chapterOrder for infinite scroll
var loading = false;
var visitStack = [];
var activeContextText = '';
var titlePageDataPromise = null;

// Highlights: { chapterId: [{start,end,color,text,note}] }
var highlights = JSON.parse(localStorage.getItem(SITE.storageKey + '_highlights') || '{}');

// ── TOC toggle ───────────────────────────────────────────────────────────
function toggleToc() {
    tocOpen = !tocOpen;
    document.getElementById('toc').classList.toggle('hidden', !tocOpen);
}

function activeReaderTarget() {
    var readerEl = document.getElementById('reader');
    if (sourceMode && currentSourceDoc) {
        return { type: 'source', docId: currentSourceDoc, scrollTop: readerEl.scrollTop || 0 };
    }
    if (currentChapter) {
        return {
            type: 'scripture',
            chapterId: currentChapter,
            verse: focusedVerseEl ? parseInt((focusedVerseEl.id || '').replace('v', ''), 10) || null : null,
            scrollTop: readerEl.scrollTop || 0
        };
    }
    return null;
}

function sameTarget(a, b) {
    if (!a || !b || a.type !== b.type) return false;
    if (a.type === 'source') return a.docId === b.docId;
    return a.chapterId === b.chapterId && (a.verse || 0) === (b.verse || 0);
}

function pushVisit(current, next) {
    if (!current || sameTarget(current, next)) return;
    var last = visitStack[visitStack.length - 1];
    if (sameTarget(last, current)) return;
    visitStack.push(current);
    if (visitStack.length > 60) visitStack.shift();
}

function quickBack() {
    var previous = visitStack.pop();
    if (!previous) return;
    if (previous.type === 'source' && previous.docId && sourceMeta[previous.docId]) {
        loadSourceDocument(previous.docId, sourceMeta[previous.docId].href, {
            pushHistory: false,
            scrollTop: previous.scrollTop || 0
        });
        return;
    }
    if (previous.type === 'scripture' && previous.chapterId) {
        jumpTo(previous.chapterId, previous.verse, {
            pushHistory: false,
            scrollTop: previous.scrollTop || 0
        });
    }
}

function buildTocTree(items) {
    var tree = { front: null, volumes: [], sources: [] };
    var currentVolume = null;
    var currentBook = null;

    items.forEach(function(item) {
        if (item.type === 'front') {
            tree.front = item;
        } else if (item.type === 'volume') {
            currentVolume = { label: item.label, books: [] };
            tree.volumes.push(currentVolume);
            currentBook = null;
        } else if (item.type === 'book' && currentVolume) {
            currentBook = {
                label: item.label,
                href: item.href,
                firstChapter: item.first_chapter,
                chapters: []
            };
            currentVolume.books.push(currentBook);
        } else if (item.type === 'chapter' && currentBook) {
            currentBook.chapters.push(item);
            chapterMeta[item.id] = {
                volume: currentVolume.label,
                book: currentBook.label,
                label: item.label
            };
        }
    });

    return tree;
}

function buildSourceTree(items) {
    return (items || []).map(function(collection) {
        var docs = (collection.items || []).map(function(doc) {
            sourceMeta[doc.id] = {
                collection: collection.label,
                label: doc.label,
                href: doc.href
            };
            return {
                id: doc.id,
                label: doc.label,
                href: doc.href,
                meta: doc.meta || (doc.paragraphs ? (doc.paragraphs + ' paragraphs') : '')
            };
        });
        return {
            id: collection.id,
            label: collection.label,
            docs: docs
        };
    });
}

// ── Load TOC ─────────────────────────────────────────────────────────────
Promise.all([
    fetch('./toc.json').then(function(r) { return r.json(); }),
    fetch('./source_toc.json').then(function(r) { return r.ok ? r.json() : []; }).catch(function() { return []; })
]).then(function(results) {
        var data = results[0];
        var sourceData = results[1] || [];
        tocData = data;
        sourceTocData = sourceData;
        tocTree = buildTocTree(data);
        tocTree.sources = buildSourceTree(sourceData);
        chapterOrder = data.filter(t => t.type === 'chapter' || t.type === 'front').map(t => t.id);
        buildToc();
        var last = localStorage.getItem(SITE.storageKey + '_position');
        var startId = (last && chapterOrder.includes(last)) ? last : 'title_page';
        setTocPathForChapter(startId);
        loadChapter(startId, true).then(() => {
            document.getElementById('splash').classList.add('gone');
            if (window.innerWidth >= 768) {
                tocOpen = true;
                document.getElementById('toc').classList.remove('hidden');
            }
        });
    });

// ── Build TOC sidebar ────────────────────────────────────────────────────
function buildToc() {
    renderTocView();
}

window.addEventListener('message', function(event) {
    var data = event && event.data;
    if (!data || data.type !== 'title-page-open-shelf') return;
    if (data.key === 'scriptures') {
        tocPath = { level: 'scripture-root', volume: null, book: null, sourceCollection: null };
        renderTocView();
        tocOpen = true;
        document.getElementById('toc').classList.remove('hidden');
    } else if (data.key === 'sources') {
        tocPath = { level: 'source-root', volume: null, book: null, sourceCollection: null };
        renderTocView();
        tocOpen = true;
        document.getElementById('toc').classList.remove('hidden');
    }
});

window.addEventListener('message', function(event) {
    var data = event && event.data;
    if (!data || data.type !== 'title-page-open-collection') return;
    var collection = findSourceCollection(data.collectionId);
    if (collection) {
        tocPath = { level: 'source-collection', volume: null, book: null, sourceCollection: collection };
        renderTocView();
        tocOpen = true;
        document.getElementById('toc').classList.remove('hidden');
    } else {
        // Fall back to source root if collection not found
        tocPath = { level: 'source-root', volume: null, book: null, sourceCollection: null };
        renderTocView();
        tocOpen = true;
        document.getElementById('toc').classList.remove('hidden');
    }
});

function renderTocView() {
    var grid = document.getElementById('toc-grid');
    var back = document.getElementById('toc-back');
    var title = document.getElementById('toc-title');
    var subtitle = document.getElementById('toc-subtitle');
    var html = '';

    if (tocPath.level === 'root') {
        grid.className = 'toc-grid';
        title.textContent = 'Library';
        subtitle.textContent = '';
        back.classList.remove('show');
        if (tocTree.front) {
            html += renderTocTile({
                label: tocTree.front.label,
                wide: true,
                active: currentChapter === tocTree.front.id,
                attrs: `data-action="chapter" data-id="${tocTree.front.id}"`
            });
        }
        html += renderTocTile({
            label: 'The Holy Scriptures',
            wide: true,
            attrs: 'data-action="scripture-root"'
        });
        html += renderTocTile({
            label: 'Other Church Writings',
            wide: true,
            attrs: 'data-action="source-root"'
        });
    } else if (tocPath.level === 'scripture-root') {
        grid.className = 'toc-grid';
        title.textContent = 'Scriptures';
        subtitle.textContent = 'The Holy Scriptures';
        back.classList.add('show');
        tocTree.volumes.forEach(function(volume) {
            html += renderTocTile({
                label: volume.label,
                attrs: `data-action="volume" data-volume="${escapeAttr(volume.label)}"`
            });
        });
    } else if (tocPath.level === 'source-root') {
        grid.className = 'toc-grid';
        title.textContent = 'Sources';
        subtitle.textContent = 'Other Church Writings';
        back.classList.add('show');
        tocTree.sources.forEach(function(collection) {
            html += renderTocTile({
                label: collection.label,
                meta: collection.docs.length + ' documents',
                attrs: `data-action="source-collection" data-collection="${escapeAttr(collection.id)}"`
            });
        });
    } else if (tocPath.level === 'volume' && tocPath.volume) {
        grid.className = 'toc-grid';
        title.textContent = 'Books';
        subtitle.textContent = tocPath.volume.label;
        back.classList.add('show');
        tocPath.volume.books.forEach(function(book) {
            html += renderTocTile({
                label: book.label,
                book: true,
                active: currentChapter && chapterMeta[currentChapter] && chapterMeta[currentChapter].book === book.label,
                attrs: `data-action="book" data-volume="${escapeAttr(tocPath.volume.label)}" data-book="${escapeAttr(book.label)}"`
            });
        });
    } else if (tocPath.level === 'source-collection' && tocPath.sourceCollection) {
        grid.className = 'toc-grid';
        title.textContent = 'Sources';
        subtitle.textContent = tocPath.sourceCollection.label;
        back.classList.add('show');
        tocPath.sourceCollection.docs.forEach(function(doc) {
            html += renderTocTile({
                label: doc.label,
                meta: doc.meta,
                active: currentSourceDoc === doc.id,
                attrs: `data-action="source-doc" data-doc="${escapeAttr(doc.id)}"`
            });
        });
    } else {
        grid.className = 'toc-grid chapter-grid';
        title.textContent = 'Chapters';
        subtitle.textContent = tocPath.book.label;
        back.classList.add('show');
        tocPath.book.chapters.forEach(function(ch) {
            html += renderTocTile({
                label: ch.label,
                chapter: true,
                active: currentChapter === ch.id,
                attrs: `data-action="chapter" data-id="${ch.id}"`
            });
        });
    }

    grid.innerHTML = html;
}

function getTitlePageData() {
    if (!titlePageDataPromise) {
        titlePageDataPromise = Promise.all([
            fetch('./source-dashboard.json').then(function(r) { return r.json(); }).catch(function() { return null; }),
            fetch('./project-progress.json').then(function(r) { return r.json(); }).catch(function() { return null; })
        ]);
    }
    return titlePageDataPromise;
}

function hydrateTitlePage() {
    var root = document.getElementById('ch-title_page');
    if (!root) return;

    function setText(id, value) {
        var el = root.querySelector('#' + id);
        if (el) el.textContent = value;
    }

    function fmt(n) {
        return Number(n || 0).toLocaleString();
    }

    getTitlePageData().then(function(payloads) {
        var dashboard = payloads[0] || {};
        var progress = payloads[1] || {};
        var t = dashboard.totals || {};

        setText('metric-docs', fmt(t.docs));
        setText('metric-doc-coverage', (t.doc_coverage_pct || 0) + '%');
        setText('metric-paragraphs', fmt(t.paragraphs));
        setText('metric-links', fmt(t.matched_paragraphs));
        setText('metric-linked-pct', (t.linked_pct || 0) + '% of paragraphs now recursively linked');
        setText('metric-collections', fmt(t.collections));
        setText('metric-annotated', (t.annotated_pct || 0) + '%');

        var bars = root.querySelector('#agent-bars');
        var recent = root.querySelector('#recent-completions');
        if (bars && progress.agents) {
            var max = 1;
            progress.agents.forEach(function(row) { max = Math.max(max, row.completed || 0); });
            bars.innerHTML = progress.agents.slice(0, 8).map(function(row) {
                var pct = Math.max(8, Math.round(((row.completed || 0) / max) * 100));
                return '<div class="bar-row">'
                    + '<div class="bar-label">' + escapeHtml(row.agent || 'Unknown') + '</div>'
                    + '<div class="bar-track"><div class="bar-fill" style="width:' + pct + '%"></div></div>'
                    + '<div class="bar-value">' + (row.completed || 0) + '</div>'
                    + '</div>';
            }).join('');
        }
        if (recent && progress.recent_completions) {
            recent.innerHTML = progress.recent_completions.slice(0, 6).map(function(row) {
                return '<li class="recent-item">'
                    + '<div class="recent-meta"><span>' + escapeHtml(row.agent || 'Unknown') + '</span><span>' + escapeHtml(row.commit || 'no commit') + '</span><span>' + escapeHtml(row.ts || '') + '</span></div>'
                    + '<div class="recent-summary">' + escapeHtml(row.summary || row.task_id || 'Completed work') + '</div>'
                    + '</li>';
            }).join('');
        }
    });

    root.querySelectorAll('[data-open-shelf]').forEach(function(link) {
        if (link.dataset.boundShelfClick === '1') return;
        link.dataset.boundShelfClick = '1';
        link.addEventListener('click', function(event) {
            event.preventDefault();
            var key = link.getAttribute('data-open-shelf');
            if (key === 'scriptures') {
                tocPath = { level: 'scripture-root', volume: null, book: null, sourceCollection: null };
            } else if (key === 'sources') {
                tocPath = { level: 'source-root', volume: null, book: null, sourceCollection: null };
            }
            renderTocView();
            tocOpen = true;
            document.getElementById('toc').classList.remove('hidden');
        });
    });

    root.querySelectorAll('[data-open-shelf-collection]').forEach(function(link) {
        if (link.dataset.boundCollectionClick === '1') return;
        link.dataset.boundCollectionClick = '1';
        link.addEventListener('click', function(event) {
            event.preventDefault();
            var collectionId = link.getAttribute('data-open-shelf-collection');
            var collection = findSourceCollection(collectionId);
            if (collection) {
                tocPath = { level: 'source-collection', volume: null, book: null, sourceCollection: collection };
            } else {
                tocPath = { level: 'source-root', volume: null, book: null, sourceCollection: null };
            }
            renderTocView();
            tocOpen = true;
            document.getElementById('toc').classList.remove('hidden');
        });
    });
}

function renderTocTile(opts) {
    return `<button class="toc-tile${opts.chapter ? ' chapter-tile' : ''}${opts.book ? ' book-tile' : ''}${opts.wide ? ' wide' : ''}${opts.active ? ' active' : ''}" ${opts.attrs || ''}>`
        + `<span class="toc-tile-title">${opts.label}</span>`
        + (opts.meta ? `<span class="toc-tile-meta">${opts.meta}</span>` : '')
        + `</button>`;
}

function findVolume(label) {
    return tocTree.volumes.find(function(volume) { return volume.label === label; }) || null;
}

function findBook(volume, label) {
    return volume && volume.books.find(function(book) { return book.label === label; }) || null;
}

function setTocPathForChapter(chapterId) {
    if (chapterId === 'title_page' || !chapterMeta[chapterId]) {
        tocPath = { level: 'root', volume: null, book: null, sourceCollection: null };
        renderTocView();
        return;
    }
    var meta = chapterMeta[chapterId];
    var volume = findVolume(meta.volume);
    var book = findBook(volume, meta.book);
    if (!volume || !book) return;
    tocPath = { level: 'book', volume: volume, book: book, sourceCollection: null };
    renderTocView();
}

function findSourceCollection(id) {
    return tocTree.sources.find(function(collection) { return collection.id === id; }) || null;
}

function setTocPathForSource(docId) {
    var meta = sourceMeta[docId];
    if (!meta) return;
    var collection = tocTree.sources.find(function(entry) { return entry.label === meta.collection; });
    if (!collection) return;
    tocPath = { level: 'source-collection', volume: null, book: null, sourceCollection: collection };
    renderTocView();
}

function tocBack() {
    if (tocPath.level === 'book' && tocPath.volume) {
        tocPath = { level: 'volume', volume: tocPath.volume, book: null, sourceCollection: null };
    } else if (tocPath.level === 'volume') {
        tocPath = { level: 'scripture-root', volume: null, book: null, sourceCollection: null };
    } else if (tocPath.level === 'source-collection') {
        tocPath = { level: 'source-root', volume: null, book: null, sourceCollection: null };
    } else {
        tocPath = { level: 'root', volume: null, book: null, sourceCollection: null };
    }
    renderTocView();
}

document.getElementById('toc-grid').addEventListener('click', function(e) {
    var tile = e.target.closest('.toc-tile');
    if (!tile) return;
    var action = tile.dataset.action;
    if (action === 'scripture-root') {
        tocPath = { level: 'scripture-root', volume: null, book: null, sourceCollection: null };
        renderTocView();
    } else if (action === 'source-root') {
        tocPath = { level: 'source-root', volume: null, book: null, sourceCollection: null };
        renderTocView();
    } else if (action === 'volume') {
        var volume = findVolume(tile.dataset.volume);
        if (!volume) return;
        tocPath = { level: 'volume', volume: volume, book: null, sourceCollection: null };
        renderTocView();
    } else if (action === 'book') {
        var volume = findVolume(tile.dataset.volume);
        var book = findBook(volume, tile.dataset.book);
        if (!volume || !book) return;
        tocPath = { level: 'book', volume: volume, book: book, sourceCollection: null };
        renderTocView();
    } else if (action === 'source-collection') {
        var collection = findSourceCollection(tile.dataset.collection);
        if (!collection) return;
        tocPath = { level: 'source-collection', volume: null, book: null, sourceCollection: collection };
        renderTocView();
    } else if (action === 'source-doc') {
        var docMeta = sourceMeta[tile.dataset.doc];
        if (!docMeta) return;
        loadSourceDocument(tile.dataset.doc, docMeta.href);
    } else if (action === 'chapter') {
        jumpTo(tile.dataset.id);
    }
});

function escapeAttr(str) {
    return String(str).replace(/"/g, '&quot;');
}

function jumpTo(chapterId, verseNum, opts) {
    opts = opts || {};
    if (opts.pushHistory !== false) {
        pushVisit(activeReaderTarget(), { type: 'scripture', chapterId: chapterId, verse: verseNum || null });
    }
    setTocPathForChapter(chapterId);
    // If the chapter is already loaded, focus the verse synchronously so
    // that callers (e.g. ref-link click handlers) can observe the focused
    // state without waiting for the Promise microtask queue to drain.
    if (!sourceMode && verseNum && loadedChapters && loadedChapters.has(chapterId)) {
        var _block = document.getElementById('ch-' + chapterId);
        if (_block) {
            var _verse = _block.querySelector('.verse[id="v' + verseNum + '"]');
            if (_verse) focusVerse(_verse, false);
        }
    }
    ensureScriptureReader().then(function() {
        return loadChapter(chapterId, true);
    }).then(() => {
        currentChapter = chapterId;
        updateLocationLabel(chapterId);
        updateActiveToc(chapterId);
        var target;
        if (verseNum) {
            var block = document.getElementById('ch-' + chapterId);
            if (block) target = block.querySelector('.verse[id="v' + verseNum + '"]');
        }
        if (!target) target = document.getElementById('ch-' + chapterId);
        if (target && target.classList && target.classList.contains('verse')) {
            focusVerse(target, false);
        }
        if (typeof opts.scrollTop === 'number') {
            document.getElementById('reader').scrollTop = opts.scrollTop;
        } else if (target) {
            target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
        if (window.innerWidth < 600) { tocOpen = false; document.getElementById('toc').classList.add('hidden'); }
    });
}

function resetReaderContent() {
    document.getElementById('content').innerHTML = '';
    document.getElementById('morsel-preview').hidden = true;
    loadedChapters = new Set();
    loadedNotes = new Set();
    nextToLoad = 0;
    loading = false;
}

function ensureScriptureReader() {
    if (!sourceMode) return Promise.resolve();
    sourceMode = false;
    currentSourceDoc = null;
    currentChapter = null;
    resetReaderContent();
    return Promise.resolve();
}

function annotateSourceText(text, words, paraIdx) {
    var entries = Object.keys(words || {}).map(function(stem) {
        return { stem: stem, entry: words[stem] };
    }).sort(function(a, b) {
        return (b.entry.score || 0) - (a.entry.score || 0);
    }).slice(0, 10);
    if (!entries.length) return escapeHtml(text);

    var spans = [];
    var lowered = String(text || '').toLowerCase();
    var maxScore = entries[0].entry.score || 1;

    entries.forEach(function(item) {
        (item.entry.forms || []).forEach(function(form) {
            var re = new RegExp('\\b' + escapeRegex(form) + '\\b', 'gi');
            var match;
            while ((match = re.exec(lowered))) {
                spans.push({
                    start: match.index,
                    end: match.index + match[0].length,
                    stem: item.stem,
                    score: Math.min(1, (item.entry.score || 0) / maxScore)
                });
            }
        });
    });

    spans.sort(function(a, b) {
        if (a.start !== b.start) return a.start - b.start;
        return (b.end - b.start) - (a.end - a.start);
    });

    var chosen = [];
    var cursor = -1;
    spans.forEach(function(span) {
        if (span.start < cursor) return;
        chosen.push(span);
        cursor = span.end;
    });

    if (!chosen.length) return escapeHtml(text);

    var out = [];
    var pos = 0;
    chosen.forEach(function(span) {
        if (span.start > pos) out.push(escapeHtml(text.slice(pos, span.start)));
        out.push(
            '<span class="w" data-st="' + escapeHtml(span.stem) + '" data-v="' + paraIdx + '" style="--ws:' + span.score.toFixed(3) + '">' +
            escapeHtml(text.slice(span.start, span.end)) +
            '</span>'
        );
        pos = span.end;
    });
    if (pos < text.length) out.push(escapeHtml(text.slice(pos)));
    return out.join('');
}

function annotateSourceBlock(block, wordsIndex) {
    if (!block || !wordsIndex) return;
    Array.from(block.querySelectorAll('p.source-para')).forEach(function(node, idx) {
        var key = String(idx + 1);
        var words = wordsIndex[key];
        if (!words) return;
        var text = node.textContent || '';
        if (!text.trim()) return;
        node.innerHTML = annotateSourceText(text, words, idx + 1);
    });
}

function sanitizeEscapedConnectionMarkup(root) {
    if (!root) return;
    Array.from(root.querySelectorAll('.verse-text, .source-para, .donaldson-para')).forEach(function(node) {
        var html = node.innerHTML;
        if (!html || (html.indexOf('&lt;span class="cw"') === -1 && html.indexOf('&amp;apos;') === -1)) return;
        html = html.replace(/&lt;span class="cw"[^&]*?&gt;((?:.|\n)*?)<\/span>/g, '$1');
        html = html.replace(/&lt;span class="cw"[^&]*?&gt;/g, '');
        html = html.replace(/&lt;\/span&gt;/g, '');
        html = html.replace(/&amp;apos;/g, '&#39;');
        node.innerHTML = html;
    });
}

function loadSourceDocument(docId, href, opts) {
    opts = opts || {};
    if (opts.pushHistory !== false) {
        pushVisit(activeReaderTarget(), { type: 'source', docId: docId });
    }
    sourceMode = true;
    currentSourceDoc = docId;
    currentChapter = null;
    setTocPathForSource(docId);
    updateLocationLabel(docId);
    closeGraph();
    closeChannel();
    resetReaderContent();
    return fetch('./' + href)
        .then(function(r) { return r.text(); })
        .then(function(html) {
            var parser = new DOMParser();
            var doc = parser.parseFromString(html, 'text/html');
            var block = document.createElement('div');
            block.className = 'chapter-block source-reader-block';
            block.id = 'src-' + docId.replace(/[^a-z0-9:_-]/ig, '_');
            block.dataset.sourceDocId = docId;
            block.innerHTML = doc.body.innerHTML;
            sanitizeEscapedConnectionMarkup(block);
            document.getElementById('content').appendChild(block);
            return loadSourceWordIndex(docId).then(function(idx) {
                annotateSourceBlock(block, idx || {});
                renderTocView();
                updateLocationLabel(docId);
                var para = null;
                if (typeof opts.focusPara === 'number') {
                    para = block.querySelectorAll('p.source-para')[opts.focusPara - 1] || null;
                }
                if (!para && opts.focusText) {
                    para = findSourceParagraphByExcerpt(block, opts.focusText);
                }
                if (para) {
                    para.classList.add('source-para-focus');
                    para.scrollIntoView({ behavior: 'smooth', block: 'center' });
                } else if (typeof opts.scrollTop === 'number') {
                    document.getElementById('reader').scrollTop = opts.scrollTop;
                } else {
                    block.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
                if (window.innerWidth < 600) { tocOpen = false; document.getElementById('toc').classList.add('hidden'); }
            });
        });
}

// ── Load a chapter (scripture text only — fast) ──────────────────────────
function loadChapter(id, prepend) {
    if (loadedChapters.has(id)) {
        return Promise.resolve();
    }
    return fetch(`./chapters/${id}.html`)
        .then(r => r.text())
        .then(html => {
            var parser = new DOMParser();
            var doc = parser.parseFromString(html, 'text/html');
            var body = doc.body;

            // Inject scripture stylesheet once
            if (!document.getElementById('epub-style')) {
                var style = document.createElement('link');
                style.id = 'epub-style';
                style.rel = 'stylesheet';
                style.href = './style/main.css';
                document.head.appendChild(style);
            }

            var block = document.createElement('div');
            block.className = 'chapter-block';
            block.id = 'ch-' + id;
            block.dataset.chapterId = id;
            block.innerHTML = body.innerHTML;
            sanitizeEscapedConnectionMarkup(block);

            var content = document.getElementById('content');
            if (prepend) {
                content.insertBefore(block, content.firstChild);
            } else {
                content.appendChild(block);
            }

            if (id === 'title_page') {
                hydrateTitlePage();
            }

            loadedChapters.add(id);
            restoreHighlights(id, block);
            setNextToLoad(id);

            // Start watching this block — notes load when it enters the viewport
            notesObserver.observe(block);
        });
}

// ── Lazy-load commentary notes ────────────────────────────────────────────
// Notes are fetched when the chapter block enters the viewport (threshold 0.05).
// Each notes file contains <div data-verse="N">...blocks...</div> sections
// that are injected into the matching verse divs.
var notesObserver = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) {
        if (!e.isIntersecting) return;
        var id = e.target.dataset.chapterId;
        if (!id || loadedNotes.has(id)) return;
        loadedNotes.add(id);
        notesObserver.unobserve(e.target);
        injectNotes(id, e.target);
    });
}, { root: document.getElementById('reader'), threshold: 0.05 });

function injectNotes(id, block) {
    fetch('./chapters/' + id + '_notes.html')
        .then(function(r) { if (r.ok) return r.text(); })
        .then(function(html) {
            if (!html) return;
            var parser = new DOMParser();
            var doc = parser.parseFromString(html, 'text/html');
            var sections = doc.body.children;
            Array.from(sections).forEach(function(section) {
                var vnum = section.dataset.verse;
                if (!vnum) return;
                var verseEl = block.querySelector('.verse[id="v' + vnum + '"]');
                if (verseEl) {
                    verseEl.insertAdjacentHTML('beforeend', section.innerHTML);
                }
            });
        })
        .catch(function() {});  // notes file absent (e.g. title page)
}

function setNextToLoad(lastLoadedId) {
    var idx = chapterOrder.indexOf(lastLoadedId);
    if (idx >= 0) nextToLoad = idx + 1;
}

// ── Infinite scroll ──────────────────────────────────────────────────────
var reader = document.getElementById('reader');
var sentinel = document.getElementById('sentinel');

var observer = new IntersectionObserver(entries => {
    if (sourceMode) return;
    if (entries[0].isIntersecting && !loading && nextToLoad < chapterOrder.length) {
        loading = true;
        var id = chapterOrder[nextToLoad];
        loadChapter(id, false).then(() => { loading = false; });
    }
}, { root: reader, threshold: 0.1 });

observer.observe(sentinel);

// ── Track current chapter for TOC highlight + position save ──────────────
var chObserver = new IntersectionObserver(entries => {
    entries.forEach(e => {
        if (e.isIntersecting) {
            var id = e.target.dataset.chapterId;
            if (id && id !== currentChapter) {
                currentChapter = id;
                localStorage.setItem(SITE.storageKey + '_position', id);
                updateLocationLabel(id);
                updateActiveToc(id);
            }
        }
    });
}, { root: reader, threshold: 0.2 });

// Observe newly added chapter blocks
var mutObs = new MutationObserver(mutations => {
    mutations.forEach(m => m.addedNodes.forEach(n => {
        if (n.classList && n.classList.contains('chapter-block')) {
            chObserver.observe(n);
        }
    }));
});
mutObs.observe(document.getElementById('content'), { childList: true });

function updateLocationLabel(id) {
    if (sourceMeta[id]) {
        document.getElementById('location-label').textContent =
            sourceMeta[id].collection + ' · ' + sourceMeta[id].label;
        return;
    }
    var item = tocData.find(t => t.id === id);
    if (!item) return;
    // Find parent book
    var idx = tocData.indexOf(item);
    var book = '';
    for (var i = idx - 1; i >= 0; i--) {
        if (tocData[i].type === 'book') { book = tocData[i].label; break; }
    }
    document.getElementById('location-label').textContent =
        book ? `${book} · ${item.label}` : item.label;
}

function updateActiveToc(id) {
    if (sourceMode && currentSourceDoc) {
        setTocPathForSource(currentSourceDoc);
        var sourceActive = document.querySelector('.toc-tile.active');
        if (sourceActive) sourceActive.scrollIntoView({ block: 'nearest' });
        return;
    }
    setTocPathForChapter(id);
    var active = document.querySelector('.toc-tile.active');
    if (active) active.scrollIntoView({ block: 'nearest' });
}

// ── Highlighting ─────────────────────────────────────────────────────────
var tip = document.getElementById('hl-tip');
var pendingRange = null;

var COLORS = ['hl-yellow', 'hl-green', 'hl-blue'];
var colorIdx = 0;

document.addEventListener('mouseup', () => {
    var sel = window.getSelection();
    if (!sel || sel.isCollapsed || !sel.toString().trim()) {
        tip.style.display = 'none';
        return;
    }
    var range = sel.getRangeAt(0);
    // Must be inside a chapter block
    var block = range.commonAncestorContainer;
    while (block && !block.dataset?.chapterId) block = block.parentElement;
    if (!block) { tip.style.display = 'none'; return; }

    pendingRange = { range: range.cloneRange(), chapterId: block.dataset.chapterId };
    var rect = range.getBoundingClientRect();
    tip.style.display = 'block';
    tip.style.left = Math.min(rect.left + rect.width / 2 - 50, window.innerWidth - 160) + 'px';
    tip.style.top  = (rect.top - 44 + window.scrollY) + 'px';
});

tip.addEventListener('click', () => {
    if (!pendingRange) return;
    applyHighlight(pendingRange.range, pendingRange.chapterId, COLORS[colorIdx % COLORS.length]);
    colorIdx++;
    tip.style.display = 'none';
    window.getSelection().removeAllRanges();
    pendingRange = null;
});

function applyHighlight(range, chapterId, colorClass) {
    // Wrap selection in a mark element
    try {
        var mark = document.createElement('mark');
        mark.className = colorClass;
        mark.dataset.hlId = Date.now();
        range.surroundContents(mark);

        // Save: store text + xpath-like path
        var hl = {
            id: mark.dataset.hlId,
            color: colorClass,
            text: mark.textContent,
            path: getPath(mark),
            offset: getTextOffset(mark, chapterId),
        };
        if (!highlights[chapterId]) highlights[chapterId] = [];
        highlights[chapterId].push(hl);
        localStorage.setItem(SITE.storageKey + '_highlights', JSON.stringify(highlights));
    } catch(e) {
        // Selection spans multiple nodes — skip
    }
}

function restoreHighlights(chapterId, block) {
    var hls = highlights[chapterId];
    if (!hls || !hls.length) return;
    // Simple restore by text search within the block
    hls.forEach(hl => {
        try {
            findAndHighlightText(block, hl.text, hl.color, hl.id);
        } catch(e) {}
    });
}

function findAndHighlightText(root, text, colorClass, hlId) {
    var walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
    var node;
    while (node = walker.nextNode()) {
        var idx = node.nodeValue.indexOf(text);
        if (idx >= 0) {
            var range = document.createRange();
            range.setStart(node, idx);
            range.setEnd(node, idx + text.length);
            var mark = document.createElement('mark');
            mark.className = colorClass;
            mark.dataset.hlId = hlId;
            range.surroundContents(mark);
            return true;
        }
    }
    return false;
}

function getPath(el) {
    var path = [];
    while (el && el.id !== 'content') {
        var idx = Array.from(el.parentNode?.children || []).indexOf(el);
        path.unshift(el.tagName + '[' + idx + ']');
        el = el.parentElement;
    }
    return path.join('/');
}

function getTextOffset(el, chapterId) {
    var block = document.getElementById('ch-' + chapterId);
    if (!block) return 0;
    var text = block.textContent;
    var hlText = el.textContent;
    return text.indexOf(hlText);
}

// ── Full-text search ─────────────────────────────────────────────────────
var searchIndex = null;       // loaded lazily on first open
var searchRows = null;        // flattened entries for scoring
var searchLoading = false;
var searchDebounce = null;
var searchOpen = false;

function openSearch() {
    searchOpen = true;
    var panel = document.getElementById('search-panel');
    panel.classList.add('open');
    var input = document.getElementById('search-input');
    input.focus();
    // Load index lazily
    if (!searchIndex && !searchLoading) {
        searchLoading = true;
        document.getElementById('search-status').textContent = 'Loading index…';
        fetch('./search.json')
            .then(function(r) { return r.json(); })
            .then(function(data) {
                searchIndex = data;
                searchRows = null;
                searchLoading = false;
                document.getElementById('search-status').textContent = 'Type to search…';
                // Run any pending query
                var q = input.value.trim();
                if (q) runSearch(q);
            })
            .catch(function() {
                searchLoading = false;
                document.getElementById('search-status').textContent = 'Could not load index.';
            });
    }
}

function closeSearch() {
    searchOpen = false;
    document.getElementById('search-panel').classList.remove('open');
    document.getElementById('search-input').value = '';
    document.getElementById('search-results').innerHTML = '';
    document.getElementById('search-status').textContent = '';
}

// Keyboard: Esc closes search (channel Esc is handled in channel section)

// Wire up the input
document.getElementById('search-input').addEventListener('input', function() {
    clearTimeout(searchDebounce);
    var q = this.value.trim();
    if (!q) {
        document.getElementById('search-results').innerHTML = '';
        document.getElementById('search-status').textContent = searchIndex ? 'Type to search…' : (searchLoading ? 'Loading index…' : '');
        return;
    }
    searchDebounce = setTimeout(function() { runSearch(q); }, 200);
});

function flattenSearchIndex() {
    if (searchRows) return searchRows;
    searchRows = [];
    if (!searchIndex) return searchRows;

    searchIndex.forEach(function(doc) {
        if (!doc || typeof doc !== 'object') return;
        if (doc.kind === 'source') {
            var text = String(doc.t || '').trim();
            if (!text) return;
            searchRows.push({
                kind: 'source',
                id: doc.id,
                collection: doc.collection || '',
                label: doc.label || '',
                meta: doc.meta || '',
                href: doc.href || '',
                n: 1,
                t: text,
                ref: (doc.collection ? doc.collection + ' · ' : '') + (doc.label || ''),
                hay: normalizeExcerpt([doc.collection || '', doc.label || '', doc.meta || '', text].join(' '))
            });
        } else {
            (doc.vv || []).forEach(function(item) {
                var text = String(item.t || '').trim();
                if (!text) return;
                searchRows.push({
                    kind: 'verse',
                    id: doc.id,
                    book: doc.b || '',
                    chapter: doc.c || 0,
                    n: item.v,
                    t: text,
                    ref: (doc.b || '') + ' ' + doc.c + ':' + item.v,
                    hay: normalizeExcerpt([doc.b || '', String(doc.c || ''), String(item.v || ''), text].join(' '))
                });
            });
        }
    });

    return searchRows;
}

function parseSearchQuery(query) {
    var raw = String(query || '').trim();
    var phrases = [];
    var stripped = raw.replace(/"([^"]+)"/g, function(_, phrase) {
        var clean = normalizeExcerpt(phrase);
        if (clean) phrases.push(clean);
        return ' ';
    });
    var norm = normalizeExcerpt(stripped);
    var terms = norm.split(' ').filter(function(tok) {
        if (!tok) return false;
        if (tok.length > 2) return true;
        return /^\d+$/.test(tok);
    });
    return {
        raw: raw,
        norm: norm,
        terms: terms,
        phrases: phrases
    };
}

function searchPriority(row) {
    if (row.kind === 'verse') return 3;
    if (row.kind === 'source') {
        if (row.collection === 'General Conference') return 2.5;
        if (row.collection === 'Journal of Discourses' || row.collection === 'History of the Church') return 2.2;
        return 1.8;
    }
    return 1.0;
}

function scoreSearchRow(row, q) {
    var score = searchPriority(row);
    var hay = row.hay || '';
    var ref = normalizeExcerpt(row.ref || '');
    var title = normalizeExcerpt([row.book || '', row.collection || '', row.label || '', row.meta || ''].join(' '));

    if (!q.terms.length && !q.phrases.length && q.raw) {
        q.terms = normalizeExcerpt(q.raw).split(' ').filter(Boolean);
    }

    var phraseHit = false;
    q.phrases.forEach(function(phrase) {
        if (!phrase) return;
        if (hay.indexOf(phrase) !== -1 || ref.indexOf(phrase) !== -1 || title.indexOf(phrase) !== -1) {
            score += 12;
            phraseHit = true;
        }
    });

    var hitCount = 0;
    q.terms.forEach(function(term) {
        if (!term) return;
        if (hay.indexOf(term) !== -1) {
            score += 3.5;
            hitCount += 1;
        }
        if (ref.indexOf(term) !== -1) score += 4.5;
        if (title.indexOf(term) !== -1) score += 5.5;
    });

    if (q.terms.length) {
        score += hitCount * 1.25;
        if (hitCount === q.terms.length) score += 4;
    }

    var exactRef = resolveScriptureRef(q.raw);
    if (exactRef && row.kind === 'verse' && row.ref === exactRef.label) {
        score += 100;
    }

    var chapterRef = resolveScriptureChapter(q.raw);
    if (chapterRef && row.kind === 'verse' && row.book === chapterRef.book && row.chapter === chapterRef.chapter) {
        score += 85;
        if (row.n === 1) score += 15;
    }

    if (q.norm && ref.indexOf(q.norm) !== -1) score += 10;
    if (phraseHit && row.kind === 'verse') score += 4;
    if (phraseHit && row.kind === 'source') score += 6;

    score -= Math.min(row.t.length / 1000, 4);
    return score;
}

function snippetForRow(row, q) {
    var text = String(row.t || '');
    if (!text) return '';
    var hay = text.toLowerCase();
    var needles = q.phrases.concat(q.terms).filter(Boolean);
    var idx = -1;
    needles.some(function(term) {
        idx = hay.indexOf(term);
        return idx >= 0;
    });
    if (idx < 0) {
        return highlightTerms(escapeHtml(text.length > 220 ? text.slice(0, 220) + '…' : text), needles);
    }
    var start = Math.max(0, idx - 72);
    var end = Math.min(text.length, idx + 180);
    var snippet = text.slice(start, end);
    if (start > 0) snippet = '…' + snippet;
    if (end < text.length) snippet = snippet + '…';
    return highlightTerms(escapeHtml(snippet), needles);
}

function runSearch(query) {
    if (!searchIndex) return;
    var q = parseSearchQuery(query);
    var rows = flattenSearchIndex();
    var results = rows.map(function(row) {
        return { row: row, score: scoreSearchRow(row, q) };
    }).filter(function(hit) {
        return hit.score > 0;
    }).sort(function(a, b) {
        if (b.score !== a.score) return b.score - a.score;
        if (a.row.kind !== b.row.kind) return a.row.kind === 'verse' ? -1 : 1;
        return String(a.row.ref || '').localeCompare(String(b.row.ref || ''));
    }).slice(0, 20);

    var status = document.getElementById('search-status');
    var container = document.getElementById('search-results');

    if (results.length === 0) {
        status.textContent = 'No results.';
        container.innerHTML = '';
        return;
    }
    status.textContent = results.length === 20 ? 'Top 20 results' : results.length + ' result' + (results.length === 1 ? '' : 's');

    var html = '';
    results.forEach(function(r) {
        html += '<div class="search-result" data-kind="' + escapeAttr(r.row.kind) + '"'
             + ' data-id="' + escapeAttr(r.row.id) + '"'
             + ' data-n="' + escapeAttr(String(r.row.n || '')) + '"'
             + ' data-href="' + escapeAttr(r.row.href || '') + '"'
             + ' data-text="' + escapeAttr(r.row.t || '') + '">'
             + '<div class="search-result-ref">' + escapeHtml(r.row.ref || '') + '</div>'
             + '<div class="search-result-text">' + snippetForRow(r.row, q) + '</div>'
             + '</div>';
    });
    container.innerHTML = html;

    // Click handler via delegation
    container.onclick = function(e) {
        var row = e.target.closest('.search-result');
        if (!row) return;
        closeSearch();
        if (row.dataset.kind === 'source') {
            var docId = row.dataset.id;
            var meta = sourceMeta[docId];
            if (meta) {
                loadSourceDocument(docId, meta.href, {
                    focusText: row.dataset.text || ''
                });
                return;
            }
        }
        var chId = row.dataset.id;
        var vNum = parseInt(row.dataset.n, 10);
        jumpTo(chId, vNum);
    };
}

function highlightTerms(text, words) {
    // Build a regex that matches any of the search words (case-insensitive)
    var escaped = words.filter(Boolean).map(function(w) {
        return w.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }).sort(function(a, b) { return b.length - a.length; });
    if (!escaped.length) return text;
    var re = new RegExp('(' + escaped.join('|') + ')', 'gi');
    return text.replace(re, '<mark class="search-hl">$1</mark>');
}

function escapeHtml(str) {
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function escapeAttr(str) {
    return escapeHtml(String(str || '')).replace(/'/g, '&#39;');
}

// ── Channel ───────────────────────────────────────────────────────────────
var channelOpen    = false;
var channelWord    = null;   // current stem
var channelMorsels = [];     // current match list
var channelIdx     = 0;      // which morsel is "current"
var channelActiveSpan = null;
var wordIndexCache = {};     // slug → loaded words JSON
var wordIndexLoading = {};   // slug → promise
var strongsIndexCache = {};  // chapter → loaded strongs JSON
var strongsIndexLoading = {}; // chapter → promise

var SRC_COLORS = {
    standard_works:        '#8B5E3C',
    donaldson:            '#D97706',
    general_conference:   '#EA580C',
    sefaria:              '#7C3AED',
    pseudepigrapha:       '#6D28D9',
    apocrypha:            '#5B21B6',
    journal_of_discourses:'#92400E',
    history_of_church:    '#1D4ED8',
    millennial_star:      '#2563EB',
    church_fathers:       '#DC2626',
    ancient_texts:        '#B45309',
    jst:                  '#059669',
    bh_roberts:           '#0891B2',
    pioneer_journals:     '#B07C3A',
    nauvoo_theology:      '#7A6A4F',
    gutenberg_lds:        '#4B5563',
    times_and_seasons:    '#374151',
    joseph_smith_papers:  '#065F46',
};

function srcColor(src) { return SRC_COLORS[src] || '#6B7280'; }

function scoreDots(w) {
    var filled = Math.round(w * 5);
    return '●'.repeat(filled) + '○'.repeat(5 - filled);
}

function srcLabel(src) {
    return (src || '').replace(/_/g, ' ').replace(/\b\w/g, function(c){ return c.toUpperCase(); });
}

var SOURCE_PRIORITY = {
    standard_works: 0,
    jst: 1
};

var SOURCE_RANK_BOOST = {
    standard_works: 0.035,
    jst: 0.03,
    donaldson: 0.002,
    general_conference: 0.015,
    journal_of_discourses: 0.015,
    history_of_church: 0.015
};

function sortMatches(matches) {
    var context = tokenSet(activeContextText);
    var sorted = (matches || []).slice().map(function(m) {
        var novelty = noveltyBonus(context, m.x || '');
        return {
            raw: m,
            rank: (m.w || 0)
                + (SOURCE_RANK_BOOST[m.s] || 0)
                + novelty
                - overlapPenalty(context, m.x || '', m.s)
                - echoPenalty(activeContextText, m.x || '', m.s, m.lb || '')
        };
    }).sort(function(a, b) {
        if (Math.abs(b.rank - a.rank) > 0.015) return b.rank - a.rank;
        var pa = SOURCE_PRIORITY.hasOwnProperty(a.raw.s) ? SOURCE_PRIORITY[a.raw.s] : 9;
        var pb = SOURCE_PRIORITY.hasOwnProperty(b.raw.s) ? SOURCE_PRIORITY[b.raw.s] : 9;
        if (pa !== pb) return pa - pb;
        return (b.raw.w || 0) - (a.raw.w || 0);
    }).map(function(entry) { return entry.raw; });
    var seen = new Set();
    sorted = sorted.filter(function(m) {
        var key = [m.s || '', m.lb || '', normalizeExcerpt(m.x || '').slice(0, 160)].join('|');
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
    });
    var scripture = [];
    var other = [];
    sorted.forEach(function(m) {
        if ((m.s === 'standard_works' || m.s === 'jst') && scripture.length < 3) scripture.push(m);
        else other.push(m);
    });
    return scripture.concat(other);
}

function escapeRegex(str) {
    return String(str).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function tokenSet(text) {
    return new Set(String(text || '').toLowerCase().match(/[a-z]{3,}/g) || []);
}

function activeVerseRefLabel() {
    if (!currentChapter || !focusedVerseEl || !chapterMeta[currentChapter]) return '';
    var verse = parseInt((focusedVerseEl.id || '').replace('v', ''), 10);
    if (!verse) return '';
    return chapterMeta[currentChapter].book + ' ' + chapterMeta[currentChapter].label + ':' + verse;
}

function noveltyBonus(context, text) {
    if (!context || !context.size) return 0;
    var other = tokenSet(text);
    if (!other.size) return 0;
    var shared = 0;
    other.forEach(function(tok) { if (context.has(tok)) shared += 1; });
    var novel = Math.max(0, other.size - shared);
    var ratio = novel / Math.max(1, other.size);
    return Math.min(0.12, ratio * 0.12);
}

function overlapPenalty(context, text, source) {
    if (!context || !context.size) return 0;
    var other = tokenSet(text);
    if (!other.size) return 0;
    var shared = 0;
    other.forEach(function(tok) { if (context.has(tok)) shared += 1; });
    var ratio = shared / Math.max(1, Math.min(context.size, other.size));
    if (ratio < 0.45) return 0;
    return ratio * ((source === 'standard_works' || source === 'jst') ? 0.22 : 0.1);
}

function echoPenalty(contextText, text, source, label) {
    var context = normalizeExcerpt(contextText);
    var excerpt = normalizeExcerpt(text);
    if (!context || !excerpt) return 0;

    var contextTokens = context.split(' ').filter(function(tok) { return tok.length >= 4; });
    var excerptTokens = excerpt.split(' ').filter(function(tok) { return tok.length >= 4; });
    if (!contextTokens.length || !excerptTokens.length) return 0;

    var shared = 0;
    var ctx = new Set(contextTokens);
    excerptTokens.forEach(function(tok) { if (ctx.has(tok)) shared += 1; });
    var sharedRatio = shared / Math.max(1, Math.min(contextTokens.length, excerptTokens.length));
    var novelRatio = Math.max(0, excerptTokens.length - shared) / Math.max(1, excerptTokens.length);
    var prefix = context.slice(0, Math.min(160, context.length));
    var hasDirectQuote = prefix.length >= 40 && excerpt.indexOf(prefix) !== -1;
    var labelRef = resolveScriptureRef(label || '');
    var activeRef = activeVerseRefLabel();
    if (activeRef) {
        var activeRefRe = new RegExp('\\b' + escapeRegex(activeRef) + '\\b', 'i');
        if (activeRefRe.test(label || '') || activeRefRe.test(text || '')) {
            return source === 'donaldson' ? 0.22 : 0.18;
        }
    }

    if ((source === 'standard_works' || source === 'jst') && labelRef) {
        return sharedRatio >= 0.58 ? 0.18 : 0;
    }
    if (hasDirectQuote && novelRatio < 0.55) {
        return 0.18;
    }
    if (sharedRatio >= 0.72) {
        return 0.14;
    }
    if (sharedRatio >= 0.56 && novelRatio < 0.35) {
        return 0.11;
    }
    return 0;
}

function findBookRecord(label) {
    var found = null;
    tocTree.volumes.some(function(volume) {
        return volume.books.some(function(book) {
            if (book.label === label) {
                found = book;
                return true;
            }
            return false;
        });
    });
    return found;
}

function resolveScriptureRef(text) {
    var names = scriptureBookNames();
    if (!names.length) return null;
    var re = new RegExp('\\b(' + names.map(escapeRegex).join('|') + ')\\.?\\s+(\\d+):(\\d+)\\b', 'i');
    var m = String(text || '').match(re);
    if (!m) return null;
    var book = findBookRecord(m[1]);
    if (!book || !book.firstChapter) return null;
    var prefix = book.firstChapter.replace(/_1$/, '');
    return {
        chapterId: prefix + '_' + parseInt(m[2], 10),
        verse: parseInt(m[3], 10),
        label: m[1] + ' ' + parseInt(m[2], 10) + ':' + parseInt(m[3], 10)
    };
}

function resolveScriptureChapter(text) {
    var names = scriptureBookNames();
    if (!names.length) return null;
    var re = new RegExp('\\b(' + names.map(escapeRegex).join('|') + ')\\.?\\s+(\\d+)\\b', 'i');
    var m = String(text || '').match(re);
    if (!m) return null;
    var book = findBookRecord(m[1]);
    if (!book || !book.firstChapter) return null;
    return {
        book: m[1],
        chapter: parseInt(m[2], 10)
    };
}

function scriptureBookNames() {
    var names = [];
    tocTree.volumes.forEach(function(volume) {
        volume.books.forEach(function(book) { names.push(book.label); });
    });
    names.sort(function(a, b) { return b.length - a.length; });
    return names;
}

function normalizeExcerpt(text) {
    return String(text || '')
        .toLowerCase()
        .replace(/<[^>]+>/g, ' ')
        .replace(/&[^;\s]+;/g, ' ')
        .replace(/[^\p{L}\p{N}\s]/gu, ' ')
        .replace(/\s+/g, ' ')
        .trim();
}

function resolveSourceTarget(m) {
    if (!m) return null;
    if (m.d && sourceMeta[m.d]) {
        return { docId: m.d, focusPara: m.p || null, focusText: m.x || '' };
    }

    var src = String(m.s || '');
    var label = String(m.lb || '');
    var match = null;
    var docId = null;

    if (src === 'general_conference') {
        match = label.match(/^GC:\s*([a-z0-9_:-]+)$/i);
        if (match) docId = 'general_conference:' + match[1].replace(/^general_conference:/, '');
    } else if (src === 'journal_of_discourses') {
        match = label.match(/JD\s+Vol\.?\s+(\d+)/i);
