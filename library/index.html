<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LDS Scriptures — The Good Project</title>
    <link rel="apple-touch-icon" sizes="180x180" href="../assets/icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="../assets/icons/favicon-32x32.png">
    <link rel="manifest" href="../site.webmanifest">

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-PCMWDK746H"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-PCMWDK746H');
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
    --bg: #F5F2EC;
    --text: #1C1C1C;
    --muted: #6C6C6C;
    --accent: #9C7A4D;
    --accent-hover: #7a5e38;
    --divider: rgba(0,0,0,0.08);
    --nav-h: 52px;
    --toc-w: 280px;
}

html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
}

/* ── Top bar ── */
#topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: var(--nav-h);
    background: var(--bg);
    border-bottom: 1px solid var(--divider);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 12px;
    z-index: 200;
}

#toc-toggle {
    background: none;
    border: none;
    cursor: pointer;
    padding: 6px;
    border-radius: 6px;
    color: var(--muted);
    display: flex;
    align-items: center;
}
#toc-toggle:hover { background: rgba(0,0,0,0.06); color: var(--text); }

#topbar .logo {
    font-weight: 600;
    font-size: 14px;
    letter-spacing: -0.04em;
    color: var(--accent);
    text-decoration: none;
    margin-right: auto;
}

#chapter-label {
    font-size: 13px;
    color: var(--muted);
    max-width: 300px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

#download-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--accent);
    color: #fff;
    text-decoration: none;
    padding: 7px 14px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
}
#download-btn:hover { background: var(--accent-hover); }

/* ── Layout ── */
#shell {
    position: fixed;
    top: var(--nav-h);
    left: 0; right: 0; bottom: 0;
    display: flex;
}

/* ── TOC panel ── */
#toc-panel {
    width: var(--toc-w);
    min-width: var(--toc-w);
    background: #FEFCF8;
    border-right: 1px solid var(--divider);
    overflow-y: auto;
    transition: width 0.2s ease, min-width 0.2s ease;
    display: flex;
    flex-direction: column;
}
#toc-panel.collapsed {
    width: 0;
    min-width: 0;
    overflow: hidden;
}

#toc-header {
    padding: 16px 16px 10px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 1px solid var(--divider);
    flex-shrink: 0;
}

#toc-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
}

.toc-item {
    display: block;
    padding: 7px 16px;
    font-size: 13px;
    color: var(--text);
    text-decoration: none;
    cursor: pointer;
    border-left: 3px solid transparent;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.toc-item:hover { background: rgba(0,0,0,0.04); }
.toc-item.active {
    color: var(--accent);
    border-left-color: var(--accent);
    background: rgba(156,122,77,0.06);
}
.toc-item.depth-1 { padding-left: 28px; font-size: 12px; color: var(--muted); }

/* ── Reader area ── */
#reader-area {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    background: var(--bg);
    scroll-behavior: smooth;
}

#viewer {
    max-width: 680px;
    margin: 0 auto;
    padding: 40px 32px 120px;
}

/* epub.js iframe fills width */
#viewer iframe {
    width: 100% !important;
    border: none !important;
}

/* ── Loading ── */
#loading {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 300;
}
#loading.done { display: none; }

.spinner {
    width: 32px; height: 32px;
    border: 3px solid rgba(156,122,77,0.2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

#loading p { font-size: 14px; color: var(--muted); }
#loading .title { font-size: 17px; font-weight: 600; color: var(--text); }

/* ── Mobile ── */
@media (max-width: 600px) {
    :root { --toc-w: 240px; }
    #toc-panel { position: fixed; top: var(--nav-h); left: 0; bottom: 0; z-index: 150; }
    #chapter-label { display: none; }
    #viewer { padding: 24px 20px 80px; }
}
    </style>
</head>
<body>

<div id="loading">
    <div class="spinner"></div>
    <div class="title">LDS Scriptures</div>
    <p>Loading annotated edition…</p>
</div>

<div id="topbar">
    <button id="toc-toggle" title="Table of contents" onclick="toggleToc()">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <line x1="3" y1="5" x2="15" y2="5"/>
            <line x1="3" y1="9" x2="15" y2="9"/>
            <line x1="3" y1="13" x2="11" y2="13"/>
        </svg>
    </button>
    <a href="../index.html" class="logo">The Good Project</a>
    <span id="chapter-label"></span>
    <a href="./LDS_Scriptures_Enriched.epub" id="download-btn" download>
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M7 2v7M4 7l3 3 3-3M2 12h10"/>
        </svg>
        Download
    </a>
</div>

<div id="shell">
    <div id="toc-panel" class="collapsed">
        <div id="toc-header">Contents</div>
        <div id="toc-list"></div>
    </div>
    <div id="reader-area">
        <div id="viewer"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/epubjs@0.3.93/dist/epub.min.js"></script>
<script>
var tocOpen = false;

function toggleToc() {
    tocOpen = !tocOpen;
    document.getElementById('toc-panel').classList.toggle('collapsed', !tocOpen);
}

var book = ePub('./LDS_Scriptures_Enriched.epub');
var rendition = book.renderTo('viewer', {
    manager: 'continuous',
    flow: 'scrolled',
    width: '100%',
    allowScriptedContent: false,
});

rendition.display();

// Hide loading screen once first content renders
rendition.on('rendered', function() {
    document.getElementById('loading').classList.add('done');
});

// Build TOC
book.loaded.navigation.then(function(nav) {
    var list = document.getElementById('toc-list');
    list.innerHTML = '';

    function addItems(items, depth) {
        items.forEach(function(item) {
            var a = document.createElement('a');
            a.className = 'toc-item' + (depth > 0 ? ' depth-1' : '');
            a.textContent = item.label.trim();
            a.title = item.label.trim();
            a.href = '#';
            a.addEventListener('click', function(e) {
                e.preventDefault();
                rendition.display(item.href);
                // On mobile close TOC after nav
                if (window.innerWidth < 600) {
                    tocOpen = false;
                    document.getElementById('toc-panel').classList.add('collapsed');
                }
            });
            list.appendChild(a);
            if (item.subitems && item.subitems.length) {
                addItems(item.subitems, depth + 1);
            }
        });
    }
    addItems(nav.toc, 0);

    // Auto-open TOC on first load if wide enough
    if (window.innerWidth >= 900) {
        tocOpen = true;
        document.getElementById('toc-panel').classList.remove('collapsed');
    }
});

// Update chapter label and active TOC item on location change
rendition.on('relocated', function(location) {
    var label = document.getElementById('chapter-label');
    book.loaded.navigation.then(function(nav) {
        var currentHref = location.start.href;
        var found = null;
        function search(items) {
            items.forEach(function(item) {
                if (item.href && currentHref && currentHref.includes(item.href.split('#')[0])) {
                    found = item;
                }
                if (item.subitems) search(item.subitems);
            });
        }
        search(nav.toc);
        if (found) {
            label.textContent = found.label.trim();
            // Highlight active item
            document.querySelectorAll('.toc-item').forEach(function(el) {
                el.classList.toggle('active', el.textContent === found.label.trim());
            });
        }
    });
});
</script>

</body>
</html>
