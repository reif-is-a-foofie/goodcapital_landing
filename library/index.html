        if (match) docId = 'journal_of_discourses:vol_' + String(parseInt(match[1], 10)).padStart(2, '0');
    } else if (src === 'history_of_church') {
        match = label.match(/HoC:\s*(vol_?\d+)/i);
        if (match) docId = 'history_of_church:' + match[1].replace('_', '');
    } else {
        match = label.match(/^[^:]+:\s*([a-z0-9_:-]+)$/i);
        if (match) {
            var suffix = match[1].replace(new RegExp('^' + escapeRegex(src) + ':'), '');
            var candidate = src + ':' + suffix;
            if (sourceMeta[candidate]) docId = candidate;
        }
    }

    if (!docId || !sourceMeta[docId]) return null;
    return { docId: docId, focusPara: m.p || null, focusText: m.x || '' };
}

function findSourceParagraphByExcerpt(block, excerpt) {
    if (!block || !excerpt) return null;
    var excerptNorm = normalizeExcerpt(excerpt).replace(/…/g, '').trim();
    if (!excerptNorm) return null;
    var prefix = excerptNorm.slice(0, 180).trim();
    var excerptTokens = prefix.split(' ').filter(function(tok) { return tok.length >= 4; }).slice(0, 18);
    var paragraphs = Array.from(block.querySelectorAll('p.source-para'));
    var best = null;
    var bestScore = 0;

    for (var i = 0; i < paragraphs.length; i++) {
        var para = paragraphs[i];
        var norm = normalizeExcerpt(para.textContent || '');
        if (!norm) continue;
        if (norm.indexOf(excerptNorm) !== -1 || (prefix && norm.indexOf(prefix) !== -1)) {
            return para;
        }
        var score = 0;
        excerptTokens.forEach(function(tok) {
            if (norm.indexOf(tok) !== -1) score += 1;
        });
        if (score > bestScore) {
            bestScore = score;
            best = para;
        }
    }

    return bestScore >= Math.min(6, Math.max(3, excerptTokens.length - 2)) ? best : null;
}

function showMorselPreview(m) {
    var host = document.getElementById('morsel-preview');
    host.hidden = false;
    host.innerHTML =
        '<div class="morsel-preview-head">'
      + '<span class="ch-src-dot" style="background:' + srcColor(m.s) + '"></span>'
      + '<div>'
      + '<div class="morsel-preview-kicker">' + escapeHtml(srcLabel(m.s)) + '</div>'
      + '<div class="morsel-preview-title">' + escapeHtml(m.lb || 'Morsel') + '</div>'
      + '</div>'
      + '</div>'
      + '<div class="morsel-preview-body">' + escapeHtml(m.x || '') + '</div>';
    host.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function openMorselInContext(selected) {
    if (!selected) return;
    var focusedVerse = document.querySelector('.verse.verse-focus');
    var focusedVerseNum = focusedVerse ? parseInt(String(focusedVerse.id || '').replace('v', ''), 10) : 0;
    var ref = resolveScriptureRef((selected.lb || '') + ' ' + (selected.x || ''));
    var sourceTarget = resolveSourceTarget(selected);
    if (ref && ref.chapterId && !(ref.chapterId === currentChapter && ref.verse === focusedVerseNum)) {
        jumpTo(ref.chapterId, ref.verse);
        return;
    }
    if (sourceTarget && sourceMeta[sourceTarget.docId]) {
        loadSourceDocument(sourceTarget.docId, sourceMeta[sourceTarget.docId].href, {
            focusPara: sourceTarget.focusPara || null,
            focusText: sourceTarget.focusText || ''
        });
        return;
    }
    showMorselPreview(selected);
}

// Load words JSON for a chapter (cached)
function loadWordIndex(pathKey, href) {
    if (wordIndexCache[pathKey]) return Promise.resolve(wordIndexCache[pathKey]);
    if (wordIndexLoading[pathKey]) return wordIndexLoading[pathKey];
    wordIndexLoading[pathKey] = fetch(href)
        .then(function(r) { if (r.ok) return r.json(); return null; })
        .then(function(data) {
            if (data && data._m && data.v) {
                var catalog = data._m;
                Object.keys(data.v).forEach(function(vnum) {
                    var verseData = data.v[vnum] || {};
                    Object.keys(verseData).forEach(function(stem) {
                        var entry = verseData[stem];
                        if (!entry || !entry.m || entry.matches) return;
                        entry.matches = entry.m.map(function(ref) { return catalog[ref]; }).filter(Boolean);
                    });
                });
                data = data.v;
            }
            wordIndexCache[pathKey] = data || {};
            return wordIndexCache[pathKey];
        })
        .catch(function() { wordIndexCache[pathKey] = {}; return {}; });
    return wordIndexLoading[pathKey];
}

function loadChapterWordIndex(slug) {
    return loadWordIndex('chapter:' + slug, './chapters/' + slug + '_words.json');
}

function loadSourceWordIndex(docId) {
    var meta = sourceMeta[docId];
    if (!meta || !meta.href) return Promise.resolve({});
    var wordsHref = './' + meta.href.replace(/\.html$/, '_words.json');
    return loadWordIndex('source:' + docId, wordsHref);
}

function loadStrongsIndex(chapterId) {
    if (!chapterId) return Promise.resolve({});
    if (strongsIndexCache[chapterId]) return Promise.resolve(strongsIndexCache[chapterId]);
    if (strongsIndexLoading[chapterId]) return strongsIndexLoading[chapterId];
    strongsIndexLoading[chapterId] = fetch('./chapters/' + chapterId + '_strongs.json')
        .then(function(r) { return r.ok ? r.json() : {}; })
        .then(function(data) {
            strongsIndexCache[chapterId] = data || {};
            return strongsIndexCache[chapterId];
        })
        .catch(function() { strongsIndexCache[chapterId] = {}; return {}; });
    return strongsIndexLoading[chapterId];
}

function scoreStrongsEntry(wordText, stem, entry) {
    var word = normalizeExcerpt(wordText || '');
    var targetStem = normalizeExcerpt(stem || '');
    var hay = normalizeExcerpt([
        entry.sn || '', entry.lm || '', entry.xl || '', entry.pr || '', entry.gl || '', entry.kj || '', entry.dv || ''
    ].join(' '));
    if (!hay) return 0;
    var score = 0;
    if (word && hay.indexOf(word) !== -1) score += 3;
    if (targetStem && hay.indexOf(targetStem) !== -1) score += 2;
    if (entry.gl && normalizeExcerpt(entry.gl).indexOf(word) !== -1) score += 2;
    return score;
}

function pickStrongsEntries(wordText, stem, entries) {
    var ranked = (entries || []).slice().map(function(entry) {
        return { entry: entry, score: scoreStrongsEntry(wordText, stem, entry) };
    }).sort(function(a, b) {
        if (b.score !== a.score) return b.score - a.score;
        return String(a.entry.sn || '').localeCompare(String(b.entry.sn || ''));
    }).map(function(row) { return row.entry; });
    return ranked.slice(0, 3);
}

function renderWordStudy(wordText, entries) {
    var host = document.getElementById('ch-study');
    if (!entries || !entries.length) {
        host.hidden = true;
        host.innerHTML = '';
        return;
    }
    host.hidden = false;
    host.innerHTML =
        '<div class="ch-study-title">Word Study</div>' +
        entries.map(function(entry) {
            var line = '<div class="ch-study-line">'
                + '<span class="ch-study-num">' + escapeHtml(entry.sn || '') + '</span>'
                + (entry.xl ? ' <span class="ch-study-lemma">' + escapeHtml(entry.xl) + '</span>' : '')
                + (entry.lm ? ' <span>' + escapeHtml(entry.lm) + '</span>' : '')
                + (entry.pr ? ' <span>(' + escapeHtml(entry.pr) + ')</span>' : '')
                + '</div>';
            var def = (entry.kj || entry.gl || '');
            if (entry.gl && entry.kj && entry.gl !== entry.kj) def += ' · ' + entry.gl;
            if (entry.dv) def += (def ? ' · from ' : 'from ') + entry.dv;
            return '<div class="ch-study-entry">' + line
                + (def ? '<div class="ch-study-def">' + escapeHtml(def) + '</div>' : '')
                + '</div>';
        }).join('');
}

// ── Verse expand/collapse ─────────────────────────────────────────────────
var focusedVerseEl = null;

function focusVerse(verse, toggleExpand) {
    if (!verse) return;
    if (focusedVerseEl && focusedVerseEl !== verse) {
        focusedVerseEl.classList.remove('verse-focus');
    }
    focusedVerseEl = verse;
    verse.classList.add('verse-focus');
    if (toggleExpand) verse.classList.toggle('expanded');
    verse.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

document.getElementById('content').addEventListener('click', function(e) {
    // Word click handled separately below — don't toggle verse for word clicks
    if (e.target.closest('span.w')) return;
    if (e.target.closest('a.ref-link, a.backlink-ref')) return;
    var verse = e.target.closest('div.verse');
    if (!verse) return;
    focusVerse(verse, true);
});

document.getElementById('content').addEventListener('click', function(e) {
    var link = e.target.closest('a.ref-link, a.backlink-ref');
    if (!link) return;
    e.preventDefault();
    e.stopPropagation();

    var href = link.getAttribute('href') || '';
    if (!href) return;

    var chapterMatch = href.match(/chapters\/([a-z0-9_]+)\.html(?:#v(\d+))?$/i);
    if (chapterMatch) {
        jumpTo(chapterMatch[1], chapterMatch[2] ? parseInt(chapterMatch[2], 10) : null);
        return;
    }

    var notesMatch = href.match(/chapters\/([a-z0-9_]+)_notes\.html(?:#v(\d+))?$/i);
    if (notesMatch) {
        jumpTo(notesMatch[1], notesMatch[2] ? parseInt(notesMatch[2], 10) : null);
        return;
    }

    var sourceHref = href.replace(/^\.\//, '').replace(/^\.\.\//, '');
    var sourceId = Object.keys(sourceMeta).find(function(id) {
        return sourceMeta[id] && sourceMeta[id].href === sourceHref;
    });
    if (sourceId && sourceMeta[sourceId]) {
        loadSourceDocument(sourceId, sourceMeta[sourceId].href, {});
        return;
    }

    window.open(href, '_blank', 'noopener');
});

// Called when user clicks a .w span
document.addEventListener('click', function(e) {
    // On mobile, touch events may land on a containing element rather than the
    // inner span.w, so fall back to hit-testing at the click coordinates.
    var span = e.target.closest('span.w')
        || (e.clientX != null && document.elementFromPoint(e.clientX, e.clientY)
            && document.elementFromPoint(e.clientX, e.clientY).closest('span.w'));
    if (!span) return;
    e.stopPropagation();

    var stem  = span.dataset.st;
    var vnum  = span.dataset.v;
    var wordText = (span.textContent || '').trim();
    var block = span.closest('.chapter-block');
    if (!block) return;
    var slug  = block.dataset.chapterId;
    var sourceDocId = block.dataset.sourceDocId;
    var contextNode = span.closest('.verse, .source-para');
    activeContextText = contextNode ? (contextNode.textContent || '') : '';

    // Mark active span
    if (channelActiveSpan) channelActiveSpan.classList.remove('cw-active');
    channelActiveSpan = span;
    span.classList.add('cw-active');

    var loader = sourceDocId ? loadSourceWordIndex(sourceDocId) : loadChapterWordIndex(slug);
    var strongsLoader = sourceDocId ? Promise.resolve({}) : loadStrongsIndex(slug);
    Promise.all([loader, strongsLoader]).then(function(results) {
        var idx = results[0] || {};
        var strongsIdx = results[1] || {};
        var studyEntries = pickStrongsEntries(wordText, stem, strongsIdx[vnum] || []);
        renderWordStudy(wordText, studyEntries);
        var verseData = idx[vnum] || {};
        var entry     = verseData[stem];
        if (!entry || !entry.matches || !entry.matches.length) {
            openChannelEmpty(stem);
            return;
        }
        openChannel(stem, entry.matches);
    });
});

function openChannelEmpty(word) {
    channelWord    = word;
    channelMorsels = [];
    channelIdx     = 0;
    document.getElementById('ch-word').textContent = word;
    document.getElementById('ch-list').innerHTML =
        '<div class="ch-empty">No connections found for this word.</div>';
    document.getElementById('channel').classList.add('open');
    channelOpen = true;
}

function openChannel(word, matches) {
    channelWord    = word;
    channelMorsels = sortMatches(matches);
    channelIdx     = 0;
    channelOpen    = true;

    document.getElementById('ch-word').textContent = word;
    document.getElementById('channel').classList.add('open');
    renderChannelList();
}

function renderChannelList() {
    var html = '';
    channelMorsels.forEach(function(m, i) {
        var isCurrent = i === channelIdx;
        var col  = srcColor(m.s);
        var dots = scoreDots(m.w);
        var name = srcLabel(m.s);
        var text = escapeHtml(m.x || '');
        html += '<div class="ch-morsel' + (isCurrent ? ' ch-current' : '') + '" data-idx="' + i + '">'
             + '<div class="ch-morsel-src">'
             + '<span class="ch-src-dot" style="background:' + col + '"></span>'
             + '<span class="ch-src-name">' + escapeHtml(name) + '</span>'
             + '<span class="ch-score-dots">' + dots + '</span>'
             + '</div>'
             + '<div class="ch-morsel-text">' + text + '</div>'
             + '<div class="ch-actions">'
             + '<button class="ch-open-context" data-idx="' + i + '">Open in Context</button>'
             + '<button class="ch-expand" data-idx="' + i + '">expand ↓</button>'
             + '</div>'
             + '<div class="ch-full-text"></div>'
             + '</div>';
    });
    var list = document.getElementById('ch-list');
    list.innerHTML = html;

    // Scroll current into view
    var cur = list.querySelector('.ch-current');
    if (cur) cur.scrollIntoView({ block: 'nearest' });

    list.onclick = function(e) {
        var openBtn = e.target.closest('.ch-open-context');
        if (openBtn) {
            var openIdx = parseInt(openBtn.dataset.idx, 10);
            channelIdx = openIdx;
            renderChannelList();
            openMorselInContext(channelMorsels[openIdx]);
            return;
        }
        var btn = e.target.closest('.ch-expand');
        if (btn) {
            var idx  = parseInt(btn.dataset.idx, 10);
            var m    = channelMorsels[idx];
            var full = btn.nextElementSibling;
            if (!m || !full) return;
            if (full.classList.contains('open')) {
                full.classList.remove('open');
                btn.textContent = 'expand ↓';
            } else {
                if (!full.innerHTML) {
                    full.innerHTML = escapeHtml(m.x || '');
                }
                full.classList.add('open');
                btn.textContent = 'collapse ↑';
            }
            return;
        }

        var morsel = e.target.closest('.ch-morsel');
        if (!morsel) return;
        channelIdx = parseInt(morsel.dataset.idx, 10);
        var selected = channelMorsels[channelIdx];
        renderChannelList();
        openMorselInContext(selected);
    };
}

function closeChannel() {
    document.getElementById('channel').classList.remove('open');
    channelOpen = false;
    renderWordStudy('', []);
    if (channelActiveSpan) {
        channelActiveSpan.classList.remove('cw-active');
        channelActiveSpan = null;
    }
}

(function setupQuickBackSwipe() {
    var readerEl = document.getElementById('reader');
    var startX = 0;
    var startY = 0;
    readerEl.addEventListener('touchstart', function(e) {
        if (!e.touches || !e.touches[0]) return;
        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;
    }, { passive: true });
    readerEl.addEventListener('touchend', function(e) {
        if (window.innerWidth > 700) return;
        if (!e.changedTouches || !e.changedTouches[0]) return;
        var dx = e.changedTouches[0].clientX - startX;
        var dy = e.changedTouches[0].clientY - startY;
        if (startX > 44) return;
        if (dx > 80 && Math.abs(dy) < 60) quickBack();
    }, { passive: true });
})();

// Spacebar advances channel
document.addEventListener('keydown', function(e) {
    if (e.key === ' ' && channelOpen && !e.target.matches('input,textarea')) {
        e.preventDefault();
        if (channelMorsels.length === 0) return;
        channelIdx = (channelIdx + 1) % channelMorsels.length;
        renderChannelList();
    }
    if (e.key === 'Escape') {
        if (graphOpen)   { closeGraph();   return; }
        if (channelOpen) { closeChannel(); return; }
        if (searchOpen)  { closeSearch();  return; }
    }
});

// ── Cross-reference Graph ─────────────────────────────────────────────────
var GRAPH_COLORS = {
    verse:              '#9C7A4D',
    standard_works:     '#8B5E3C',
    donaldson:          '#D97706',
    general_conference: '#EA580C',
    sefaria:            '#7C3AED',
    pseudepigrapha:     '#6D28D9',
    apocrypha:          '#5B21B6',
    journal_of_discourses: '#92400E',
    history_of_church:  '#1D4ED8',
    millennial_star:    '#2563EB',
    church_fathers:     '#DC2626',
    ancient_texts:      '#B45309',
    jst:                '#059669',
    bh_roberts:         '#0891B2',
    pioneer_journals:   '#B07C3A',
    nauvoo_theology:    '#7A6A4F',
    gutenberg_lds:      '#4B5563',
    times_and_seasons:  '#374151',
    joseph_smith_papers:'#065F46',
};

function srcColor(src) {
    return GRAPH_COLORS[src] || '#6B7280';
}

var graphSimulation = null;
var graphOpen = false;

function openGraph() {
    if (!currentChapter) return;
    var panel = document.getElementById('graph-panel');
    panel.classList.add('open');
    graphOpen = true;

    var label = document.getElementById('location-label').textContent;
    document.getElementById('graph-chapter-label').textContent = label ? '— ' + label : '';

    // Load D3 lazily then fetch graph data
    ensureD3(function() {
        fetch('./chapters/' + currentChapter + '_graph.json')
            .then(function(r) { if (r.ok) return r.json(); return null; })
            .then(function(data) {
                if (!data) {
                    document.getElementById('graph-svg-wrap').innerHTML =
                        '<p style="padding:40px;color:var(--muted);font-size:13px">No cross-references for this chapter.</p>';
                    return;
                }
                renderGraph(data, currentChapter);
            })
            .catch(function() {});
    });
}

function closeGraph() {
    document.getElementById('graph-panel').classList.remove('open');
    graphOpen = false;
    if (graphSimulation) { graphSimulation.stop(); graphSimulation = null; }
    document.getElementById('graph-svg').innerHTML = '';
    document.getElementById('graph-legend').innerHTML = '';
    document.getElementById('graph-tip').style.display = 'none';
}

// (graph Esc merged into channel keydown handler below)

var d3Loaded = false;
var d3Queue = [];

function ensureD3(cb) {
    if (d3Loaded) { cb(); return; }
    d3Queue.push(cb);
    if (d3Queue.length > 1) return; // already loading
    var s = document.createElement('script');
    s.src = 'https://unpkg.com/d3@7/dist/d3.min.js';
    s.onload = function() {
        d3Loaded = true;
        d3Queue.forEach(function(fn) { fn(); });
        d3Queue = [];
    };
    document.head.appendChild(s);
}

function renderGraph(data, chapterId) {
    var wrap  = document.getElementById('graph-svg-wrap');
    var svgEl = document.getElementById('graph-svg');
    svgEl.innerHTML = '';

    var W = wrap.clientWidth;
    var H = wrap.clientHeight;

    // Build D3 nodes and links from compact format
    var nodes = data.nodes.map(function(n) { return Object.assign({}, n); });
    var nodeById = {};
    nodes.forEach(function(n) { nodeById[n.id] = n; });

    var links = data.edges.map(function(e) {
        return { source: nodeById[e.s], target: nodeById[e.t], w: e.w };
    }).filter(function(l) { return l.source && l.target; });

    // Separate verse nodes and passage nodes for radius
    function radius(n) { return n.t === 'v' ? 10 : 6; }
    function color(n)  { return n.t === 'v' ? GRAPH_COLORS.verse : srcColor(n.src); }

    var svg = d3.select(svgEl)
        .attr('width', W).attr('height', H);

    // Zoom/pan
    var g = svg.append('g');
    svg.call(d3.zoom().scaleExtent([0.2, 4]).on('zoom', function(event) {
        g.attr('transform', event.transform);
    }));

    // Links
    var link = g.append('g').selectAll('line')
        .data(links).join('line')
        .attr('stroke', function(d) { return srcColor(d.target.src || ''); })
        .attr('stroke-opacity', function(d) { return Math.max(0.15, d.w * 0.7); })
        .attr('stroke-width', function(d) { return Math.max(0.5, d.w * 2.5); });

    // Nodes
    var node = g.append('g').selectAll('circle')
        .data(nodes).join('circle')
        .attr('r', radius)
        .attr('fill', color)
        .attr('stroke', '#fff')
        .attr('stroke-width', 1.5)
        .attr('cursor', function(n) { return n.t === 'v' ? 'pointer' : 'default'; })
        .on('click', function(event, n) {
            if (n.t === 'v') {
                closeGraph();
                jumpTo(chapterId, n.n);
            }
        })
        .on('mousemove', function(event, n) {
            var tip = document.getElementById('graph-tip');
            if (n.t === 'p') {
                var rect = wrap.getBoundingClientRect();
                tip.style.display = 'block';
                var src = (n.src || '').replace(/_/g, ' ');
                tip.innerHTML = '<div class="gt-src">' + src + '</div>' + escapeHtml(n.x || n.lb || '');
                // Position inside wrap
                var tx = event.clientX - rect.left + 12;
                var ty = event.clientY - rect.top + 12;
                if (tx + 310 > W) tx = event.clientX - rect.left - 320;
                tip.style.left = tx + 'px';
                tip.style.top  = ty + 'px';
            } else if (n.t === 'v') {
                var tip = document.getElementById('graph-tip');
                var rect = wrap.getBoundingClientRect();
                tip.style.display = 'block';
                tip.innerHTML = '<div class="gt-src">Verse ' + n.n + '</div>' + escapeHtml(n.x || '');
                var tx = event.clientX - rect.left + 12;
                var ty = event.clientY - rect.top + 12;
                if (tx + 310 > W) tx = event.clientX - rect.left - 320;
                tip.style.left = tx + 'px';
                tip.style.top  = ty + 'px';
            }
        })
        .on('mouseleave', function() {
            document.getElementById('graph-tip').style.display = 'none';
        })
        .call(d3.drag()
            .on('start', function(event, n) {
                if (!event.active) graphSimulation.alphaTarget(0.3).restart();
                n.fx = n.x; n.fy = n.y;
            })
            .on('drag', function(event, n) { n.fx = event.x; n.fy = event.y; })
            .on('end', function(event, n) {
                if (!event.active) graphSimulation.alphaTarget(0);
                n.fx = null; n.fy = null;
            }));

    // Verse number labels (only for verse nodes)
    var label = g.append('g').selectAll('text')
        .data(nodes.filter(function(n) { return n.t === 'v'; }))
        .join('text')
        .text(function(n) { return n.n; })
        .attr('font-size', 8)
        .attr('fill', '#fff')
        .attr('text-anchor', 'middle')
        .attr('dominant-baseline', 'central')
        .attr('pointer-events', 'none');

    graphSimulation = d3.forceSimulation(nodes)
        .force('link', d3.forceLink(links).id(function(n) { return n.id; }).distance(60).strength(0.4))
        .force('charge', d3.forceManyBody().strength(-120))
        .force('center', d3.forceCenter(W / 2, H / 2))
        .force('collide', d3.forceCollide().radius(function(n) { return radius(n) + 3; }))
        .on('tick', function() {
            link.attr('x1', function(d) { return d.source.x; })
                .attr('y1', function(d) { return d.source.y; })
                .attr('x2', function(d) { return d.target.x; })
                .attr('y2', function(d) { return d.target.y; });
            node.attr('cx', function(d) { return d.x; })
                .attr('cy', function(d) { return d.y; });
            label.attr('x', function(d) { return d.x; })
                 .attr('y', function(d) { return d.y; });
        });

    // Build legend from sources present in this graph
    var srcsSeen = {};
    nodes.forEach(function(n) { if (n.t === 'p' && n.src) srcsSeen[n.src] = true; });
    var legEl = document.getElementById('graph-legend');
    var legHtml = '<span><span class="gl-dot" style="background:' + GRAPH_COLORS.verse + '"></span>Verse</span>';
    Object.keys(srcsSeen).forEach(function(src) {
        var label = src.replace(/_/g, ' ').replace(/\b\w/g, function(c) { return c.toUpperCase(); });
        legHtml += '<span><span class="gl-dot" style="background:' + srcColor(src) + '"></span>' + label + '</span>';
    });
    legEl.innerHTML = legHtml;
}

// ── Service Worker ────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(function() {});
}

// ── Offline badge ─────────────────────────────────────────────────────────
(function() {
    var badge = document.getElementById('offline-badge');
    function updateBadge() {
        badge.style.display = navigator.onLine ? 'none' : 'inline-block';
    }
    updateBadge();
    window.addEventListener('online', updateBadge);
    window.addEventListener('offline', updateBadge);
})();
</script>
